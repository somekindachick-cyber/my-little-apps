<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：垃圾话博弈</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif"; touch-action: none; }
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('image_78211d.jpg?v=2'); 
            background-size: cover; background-position: center;
        }

        /* 瞄准镜 */
        #aim-scope {
            position: absolute; border: 2px solid rgba(255, 0, 0, 0.6); border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 30; display: none; box-sizing: border-box;
        }
        #aim-scope.locked { border-color: #00ff00; background: rgba(0, 255, 0, 0.2); }

        /* 哲学家通用样式 */
        .philosopher-container {
            position: absolute; width: 180px; z-index: 10;
            transform: translate(-50%, -50%); 
            transition: opacity 0.3s;
        }
        .philosopher-img { width: 100%; user-select: none; -webkit-user-drag: none; }

        /* 玩家：金色光晕 */
        .player { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); cursor: grab; z-index: 20; }
        
        /* 垃圾话气泡 */
        .speech-bubble {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            background: white; border: 2px solid black; padding: 5px 10px;
            border-radius: 10px; font-size: 12px; white-space: nowrap;
            font-weight: bold; pointer-events: none; opacity: 0;
            transition: opacity 0.3s; z-index: 40;
        }

        /* 入座动画库 */
        .sit-animation {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            transform: translate(-50%, -50%) scale(0.8) !important;
        }

        .winner-sitting {
            position: absolute; width: 100%; height: 100%;
            background-image: url('image_782124.jpg?v=2');
            background-size: cover; background-position: center;
            z-index: 5; opacity: 0; transition: opacity 0.3s;
        }

        #ui { position: absolute; top: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000; padding: 15px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 8px 8px 0px #000;
        }
        #countdown { font-size: 50px; color: #00ff00; font-weight: 900; display: none; }
        .btn { background: #000; color: #fff; padding: 12px 35px; border: none; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="aim-scope"></div>
    <div id="winner-layer" class="winner-sitting"></div>
    <div id="ui">
        <div class="panel">
            <div id="status">第 <span id="lv-num">1</span> 关</div>
            <div id="msg">确证即存在</div>
            <div id="countdown">3</div>
            <button id="main-btn" class="btn" onclick="initAndStart()">开启轮回</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1, isGaming = false, isDragging = false, audioCtx;
    let playerPos = { x: 0, y: 0 }, chairPos = { x: 0, y: 0 };
    let startMouse = { x: 0, y: 0 }, startObj = { x: 0, y: 0 };
    
    let hitRadius = 50; 
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const trashTalks = [
        "你只是虚无的影子！", "椅子属于更有思想的人。", 
        "上帝已死，而你太慢！", "这是我的存在瞬间。", 
        "你甚至无法定义你自己！", "平庸的人不配入座。"
    ];

    function setupPlatform() {
        hitRadius = isTouchDevice ? 40 : 100;
        chairPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }
    window.addEventListener('resize', setupPlatform);
    setupPlatform();

    function playTone(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }

    function startLevel() {
        isGaming = true; isDragging = false;
        document.getElementById('main-btn').style.display = 'none';
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('winner-layer').style.opacity = '0';
        
        const scope = document.getElementById('aim-scope');
        scope.style.display = 'block';
        scope.style.width = (hitRadius * 2) + 'px';
        scope.style.height = (hitRadius * 2) + 'px';
        scope.classList.remove('locked');

        document.getElementById('lv-num').innerText = currentLevel;
        document.querySelectorAll('.philosopher-container').forEach(p => p.remove());

        // 1. 创建玩家并显示在初始位置
        playerPos = { x: window.innerWidth * 0.85, y: window.innerHeight * 0.85 };
        const pContainer = createPhilosopher('image_78215a.png?v=2', 'player');
        pContainer.id = 'player-node';
        updatePos(pContainer, playerPos.x, playerPos.y);
        document.getElementById('game-stage').appendChild(pContainer);
        bindDrag(pContainer);

        // 2. 创建 AI 并显示在初始位置
        for (let i = 0; i < currentLevel; i++) {
            const aiContainer = createPhilosopher('image_78215a.png?v=2', 'ai');
            let aiX = Math.random() > 0.5 ? -100 : window.innerWidth + 100;
            let aiY = Math.random() * window.innerHeight;
            updatePos(aiContainer, aiX, aiY);
            document.getElementById('game-stage').appendChild(aiContainer);
            
            // 3. AI 开始说垃圾话
            setTimeout(() => {
                const bubble = aiContainer.querySelector('.speech-bubble');
                bubble.innerText = trashTalks[Math.floor(Math.random() * trashTalks.length)];
                bubble.style.opacity = 1;
                // AI 启动竞速
                startAiLogic(aiContainer);
            }, 1000); 
        }
    }

    function createPhilosopher(src, className) {
        const container = document.createElement('div');
        container.className = 'philosopher-container ' + className;
        container.innerHTML = `
            <div class="speech-bubble">...</div>
            <img src="${src}" class="philosopher-img">
        `;
        return container;
    }

    function startAiLogic(el) {
        const duration = Math.max(0.5, 4.0 - (currentLevel * 0.5));
        el.style.transition = `all ${duration}s cubic-bezier(0.1, 0, 0.3, 1)`;
        updatePos(el, chairPos.x, chairPos.y);
        
        setTimeout(() => {
            if (isGaming) {
                el.classList.add('sit-animation');
                endRound(false);
            }
        }, duration * 1000);
    }

    function updatePos(el, x, y) { 
        el.style.left = x + 'px'; 
        el.style.top = y + 'px'; 
    }

    function bindDrag(el) {
        const start = (e) => {
            if (!isGaming) return;
            e.preventDefault();
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startMouse = { x: pos.clientX, y: pos.clientY };
            startObj = { x: playerPos.x, y: playerPos.y };
        };
        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            playerPos.x = startObj.x + (pos.clientX - startMouse.x);
            playerPos.y = startObj.y + (pos.clientY - startMouse.y);
            updatePos(el, playerPos.x, playerPos.y);

            const dist = Math.sqrt(Math.pow(playerPos.x - chairPos.x, 2) + Math.pow(playerPos.y - chairPos.y, 2));
            if (dist < hitRadius) {
                isDragging = false;
                el.classList.add('sit-animation');
                updatePos(el, chairPos.x, chairPos.y);
                document.getElementById('aim-scope').classList.add('locked');
                endRound(true);
            }
        };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    function endRound(win) {
        if (!isGaming) return;
        isGaming = false;
        
        setTimeout(() => {
            document.getElementById('aim-scope').style.display = 'none';
            document.querySelectorAll('.philosopher-container').forEach(p => {
                if(!p.classList.contains('sit-animation')) p.style.opacity = '0';
            });
            
            setTimeout(() => {
                document.getElementById('winner-layer').style.opacity = '1';
                if (win) {
                    playTone(880, 0.4);
                    currentLevel++;
                    document.getElementById('msg').innerText = "确证成功！下一轮回倒计时...";
                    startCountdown();
                } else {
                    playTone(150, 0.4);
                    document.getElementById('msg').innerText = "太慢了，存在被夺走了！";
                    document.getElementById('main-btn').style.display = 'inline-block';
                    document.getElementById('main-btn').innerText = "重启轮回";
                }
            }, 300);
        }, 100);
    }

    function startCountdown() {
        let count = 3;
        const cd = document.getElementById('countdown');
        cd.innerText = count; cd.style.display = 'block';
        const timer = setInterval(() => {
            count--;
            if (count > 0) { cd.innerText = count; playTone(660, 0.1); }
            else { clearInterval(timer); startLevel(); }
        }, 1000);
    }
</script>
</body>
</html>
