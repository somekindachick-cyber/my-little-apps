<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：入座瞬间</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif"; touch-action: none; }
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('image_78211d.jpg?v=5'); 
            background-size: cover; background-position: center;
        }

        /* 瞄准镜 */
        #aim-scope {
            position: absolute; border: 2px solid rgba(255, 0, 0, 0.6); border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 30; display: none; box-sizing: border-box;
        }

        /* 哲学家容器 */
        .philosopher-container {
            position: absolute; width: 180px; z-index: 10;
            transform: translate(-50%, -50%); 
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .philosopher-img { width: 100%; user-select: none; -webkit-user-drag: none; }

        /* 玩家光晕 */
        .player { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); z-index: 20; }
        .ai { z-index: 15; }

        /* 气泡 */
        .speech-bubble {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            background: white; border: 2px solid #000; padding: 5px 12px;
            border-radius: 15px; font-size: 14px; white-space: nowrap;
            box-shadow: 3px 3px 0 #000; opacity: 0; transition: opacity 0.3s;
        }

        /* 全景结算图 */
        .winner-sitting {
            position: absolute; width: 100%; height: 100%;
            background-image: url('image_782124.jpg?v=5');
            background-size: cover; background-position: center;
            z-index: 5; opacity: 0; transition: opacity 0.3s;
        }

        #ui { position: absolute; top: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000; padding: 15px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 8px 8px 0px #000;
        }
        #countdown { font-size: 50px; color: #00ff00; font-weight: 900; display: none; }
        .btn { background: #000; color: #fff; padding: 12px 35px; border: none; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="aim-scope"></div>
    <div id="winner-layer" class="winner-sitting"></div>
    <div id="ui">
        <div class="panel">
            <div id="status">第 <span id="lv-num">1</span> 关</div>
            <div id="msg">确证即存在</div>
            <div id="countdown">3</div>
            <button id="main-btn" class="btn" onclick="initAndStart()">开启轮回</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1, isGaming = false, isDragging = false, audioCtx;
    let playerPos = { x: 0, y: 0 }, chairPos = { x: 0, y: 0 };
    let startMouse = { x: 0, y: 0 }, startObj = { x: 0, y: 0 };
    let hitRadius = 50;
    
    const STAND_IMG = 'image_78215a.png?v=5'; // 站立图
    const SIT_CROP_IMG = 'image_782124.jpg?v=5'; // 坐下全景图（用于切换）

    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    function setupPlatform() {
        hitRadius = isTouchDevice ? 45 : 95;
        chairPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }
    setupPlatform();
    window.addEventListener('resize', setupPlatform);

    function playTone(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }

    function startLevel() {
        isGaming = true; isDragging = false;
        document.getElementById('main-btn').style.display = 'none';
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('winner-layer').style.opacity = '0';
        
        const scope = document.getElementById('aim-scope');
        scope.style.display = 'block';
        scope.style.width = (hitRadius * 2) + 'px';
        scope.style.height = (hitRadius * 2) + 'px';

        document.getElementById('lv-num').innerText = currentLevel;
        document.querySelectorAll('.philosopher-container').forEach(p => p.remove());

        // 玩家站立进入
        playerPos = { x: window.innerWidth * 0.85, y: window.innerHeight * 0.85 };
        const pContainer = createPhilosopher(STAND_IMG, 'player');
        pContainer.id = 'player-node';
        updatePos(pContainer, playerPos.x, playerPos.y);
        document.getElementById('game-stage').appendChild(pContainer);
        bindDrag(pContainer);

        // AI 站立进入
        for (let i = 0; i < currentLevel; i++) {
            const aiContainer = createPhilosopher(STAND_IMG, 'ai');
            let aiX = Math.random() > 0.5 ? -150 : window.innerWidth + 150;
            let aiY = Math.random() * window.innerHeight;
            updatePos(aiContainer, aiX, aiY);
            document.getElementById('game-stage').appendChild(aiContainer);
            
            setTimeout(() => {
                if(!isGaming) return;
                const bubble = aiContainer.querySelector('.speech-bubble');
                bubble.innerText = "这位置是我的！";
                bubble.style.opacity = 1;
                startAiLogic(aiContainer);
            }, 800);
        }
    }

    function createPhilosopher(src, className) {
        const container = document.createElement('div');
        container.className = 'philosopher-container ' + className;
        container.innerHTML = `<div class="speech-bubble">...</div><img src="${src}" class="philosopher-img">`;
        return container;
    }

    function updatePos(el, x, y) { el.style.left = x + 'px'; el.style.top = y + 'px'; }

    // 核心逻辑：入座切换
    function performSit(el, isPlayerWin) {
        isGaming = false; isDragging = false;
        
        // 1. 瞬间切换图片为坐下（这里利用全景图，但通过 clip-path 或简单替换）
        // 为了方便，直接替换 src，并让图片略微下移模拟坐姿
        const img = el.querySelector('.philosopher-img');
        img.src = SIT_CROP_IMG; 
        el.style.zIndex = 40;
        
        // 如果是全景图，我们给 img 加个样式让它看起来像个立绘
        img.style.borderRadius = "50%";
        img.style.width = "150px";
        img.style.height = "150px";
        img.style.objectFit = "cover";

        // 2. 强行吸附到椅子中心
        el.style.transition = "all 0.2s ease-out";
        updatePos(el, chairPos.x, chairPos.y);

        playTone(isPlayerWin ? 880 : 220, 0.2);

        // 3. 保持半秒钟坐在草地的画面
        setTimeout(() => {
            // 4. 隐藏所有人，显示全景坐下背景
            document.querySelectorAll('.philosopher-container').forEach(p => p.style.opacity = '0');
            document.getElementById('winner-layer').style.opacity = '1';
            document.getElementById('aim-scope').style.display = 'none';

            if (isPlayerWin) {
                currentLevel++;
                document.getElementById('msg').innerText = "你赢得了存在。";
                startCountdown(); // 自动进入下一关
            } else {
                document.getElementById('msg').innerText = "AI 夺走了你的椅子。";
                // 失败后也自动读秒重新开始本关
                setTimeout(() => startLevel(), 2000); 
            }
        }, 500); // 这里的 500ms 就是你要求的“保持半秒”
    }

    function startAiLogic(el) {
        const duration = Math.max(0.5, 4.2 - (currentLevel * 0.45));
        el.style.transition = `all ${duration}s cubic-bezier(0.4, 0, 0.2, 1)`;
        updatePos(el, chairPos.x, chairPos.y);
        setTimeout(() => { if (isGaming) performSit(el, false); }, duration * 1000);
    }

    function bindDrag(el) {
        const start = (e) => {
            if (!isGaming) return;
            e.preventDefault(); isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startMouse = { x: pos.clientX, y: pos.clientY };
            startObj = { x: playerPos.x, y: playerPos.y };
        };
        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            playerPos.x = startObj.x + (pos.clientX - startMouse.x);
            playerPos.y = startObj.y + (pos.clientY - startMouse.y);
            updatePos(el, playerPos.x, playerPos.y);

            const dist = Math.sqrt(Math.pow(playerPos.x - chairPos.x, 2) + Math.pow(playerPos.y - chairPos.y, 2));
            if (dist < hitRadius) performSit(el, true);
        };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    function startCountdown() {
        let count = 3;
        const cd = document.getElementById('countdown');
        cd.innerText = count; cd.style.display = 'block';
        const timer = setInterval(() => {
            count--;
            if (count > 0) { cd.innerText = count; playTone(660, 0.1); }
            else { clearInterval(timer); startLevel(); }
        }, 1000);
    }
</script>
</body>
</html>
