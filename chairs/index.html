<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：巨型哲学家</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: "serif"; 
            touch-action: none; 
        }
        
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('image_78211d.jpg');
            background-size: cover;
            background-position: center;
            transition: background-image 0.4s ease-in-out;
        }

        /* 缩小椅子判定区：增加操作精度要求 */
        #chair-hitbox {
            position: absolute; width: 60px; height: 60px;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
            /* border: 1px dashed rgba(255,255,255,0.3); 可视化调试用 */
        }

        .philosopher {
            position: absolute; 
            width: 200px; /* 显著放大哲学家尺寸 */
            z-index: 10;
            user-select: none; -webkit-user-drag: none;
            transition: transform 0.2s ease, opacity 0.3s;
        }

        /* 玩家：初始位置在右下角 */
        .player {
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.9));
            cursor: grab;
            right: 5%; bottom: 5%;
        }
        .player:active { cursor: grabbing; transform: scale(1.05); }

        /* AI：竞争者 */
        .ai { filter: grayscale(1) brightness(0.7) opacity(0.8); pointer-events: none; }

        /* UI 面板 */
        #ui {
            position: absolute; top: 0; width: 100%; text-align: center;
            pointer-events: none; z-index: 100;
        }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.9);
            border: 3px solid #000; padding: 10px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 10px 10px 0px #000;
        }
        .btn { 
            background: #000; color: #fff; padding: 12px 35px; 
            border: none; cursor: pointer; font-size: 20px; 
            font-weight: bold; margin: 10px 0;
        }
        #level-info { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="chair-hitbox"></div>

    <div id="ui">
        <div class="panel">
            <div id="level-info">关卡 1</div>
            <div id="status">椅子很小，而你如此沉重。</div>
            <button id="main-btn" class="btn" onclick="startLevel()">开始争夺</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1;
    let isGaming = false;
    let isDragging = false;
    let playerObj, startX, startY, initX, initY;

    const stage = document.getElementById('game-stage');
    const hitbox = document.getElementById('chair-hitbox');
    const statusText = document.getElementById('status');
    const levelText = document.getElementById('level-info');
    const mainBtn = document.getElementById('main-btn');

    function startLevel() {
        isGaming = true;
        isDragging = false;
        mainBtn.style.display = 'none';
        statusText.innerText = "用你的存在填满那个座位！";
        stage.style.backgroundImage = "url('image_78211d.jpg')";
        
        document.querySelectorAll('.philosopher').forEach(p => p.remove());

        // 生成玩家：右下角
        playerObj = document.createElement('img');
        playerObj.src = 'image_78215a.png';
        playerObj.className = 'philosopher player';
        stage.appendChild(playerObj);
        
        addDragLogic(playerObj);

        // 生成AI
        for (let i = 0; i < currentLevel; i++) {
            createAI(i);
        }
    }

    function createAI(i) {
        const ai = document.createElement('img');
        ai.src = 'image_78215a.png';
        ai.className = 'philosopher ai';
        // AI 从左侧或顶部滑入
        ai.style.left = '-250px'; 
        ai.style.top = (Math.random() * 50) + '%';
        stage.appendChild(ai);

        // 难度调节：AI 速度随关卡提升
        const duration = Math.max(0.5, 3.8 - (currentLevel * 0.4));
        
        setTimeout(() => {
            if (!isGaming) return;
            ai.style.transition = `all ${duration}s cubic-bezier(0.2, 0.5, 0.8, 1)`;
            ai.style.left = '40%'; // 目标点微调以匹配大尺寸
            ai.style.top = '35%';
            
            const aiInterval = setInterval(() => {
                if (!isGaming) clearInterval(aiInterval);
                if (isHit(ai)) { clearInterval(aiInterval); endRound(false); }
            }, 50);
        }, 800);
    }

    function addDragLogic(el) {
        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            el.style.left = (initX + (pos.clientX - startX)) + 'px';
            el.style.top = (initY + (pos.clientY - startY)) + 'px';
            el.style.right = 'auto';
            el.style.bottom = 'auto';

            if (isHit(el)) { isDragging = false; endRound(true); }
        };

        const start = (e) => {
            if (!isGaming) return;
            e.preventDefault();
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startX = pos.clientX;
            startY = pos.clientY;
            initX = el.offsetLeft;
            initY = el.offsetTop;
        };

        const stop = () => isDragging = false;

        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchend', stop);
    }

    function isHit(el) {
        const r1 = el.getBoundingClientRect();
        const r2 = hitbox.getBoundingClientRect();
        // 因为哲学家变大了，我们要检测哲学家的中心点是否靠近椅子中心
        const dx = (r1.left + r1.width/2) - (r2.left + r2.width/2);
        const dy = (r1.top + r1.height/2) - (r2.top + r2.height/2);
        // 判定距离也略微收紧，要求更准确
        return Math.sqrt(dx*dx + dy*dy) < 50; 
    }

    function endRound(win) {
        if (!isGaming) return;
        isGaming = false;
        
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        if (win) {
            stage.style.backgroundImage = "url('image_782124.jpg')";
            currentLevel++;
            statusText.innerText = "你比虚无更沉重！";
            mainBtn.innerText = "下一场轮回";
        } else {
            statusText.innerText = "椅子太小，你没能挤进去。";
            mainBtn.innerText = "再次确证";
        }
        
        levelText.innerText = `关卡 ${currentLevel}`;
        mainBtn.style.display = 'inline-block';
    }
</script>
</body>
</html>
