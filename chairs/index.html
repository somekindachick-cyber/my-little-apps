<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：3秒速决</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif"; touch-action: none; }
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('image_78211d.jpg'); 
            background-size: cover; background-position: center;
        }

        .philosopher {
            position: absolute; width: 180px; z-index: 10;
            user-select: none; -webkit-user-drag: none;
            transform: translate(-50%, -50%); 
        }

        .player { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9)); cursor: grab; z-index: 20; }
        
        .winner-sitting {
            position: absolute; width: 100%; height: 100%;
            background-image: url('image_782124.jpg');
            background-size: cover; background-position: center;
            z-index: 5; opacity: 0; transition: opacity 0.3s;
        }

        #ui { position: absolute; top: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000; padding: 10px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 8px 8px 0px #000;
        }
        #msg { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        #countdown { font-size: 48px; color: #ff0000; font-weight: 900; display: none; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .btn { background: #000; color: #fff; padding: 12px 35px; border: none; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="winner-layer" class="winner-sitting"></div>
    <div id="ui">
        <div class="panel">
            <div id="status">第 <span id="lv-num">1</span> 关</div>
            <div id="msg">点击确证开始</div>
            <div id="countdown">3</div>
            <button id="main-btn" class="btn" onclick="initAndStart()">确证存在</button>
        </div>
    </div>
</div>

    const countdownEl = document.getElementById('countdown');

        chairPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }
    window.addEventListener('resize', resize);
    resize();

    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }
