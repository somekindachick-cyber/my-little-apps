<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：手动抢座</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: "serif"; touch-action: none; }
        #game-stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* 椅子位置 */
        #chair-target {
            position: absolute; width: 180px; left: 50%; top: 55%;
            transform: translate(-50%, -50%); z-index: 1;
        }

        /* 哲学家 */
        .philosopher {
            position: absolute; width: 120px; z-index: 10;
            cursor: grab; user-select: none; -webkit-user-drag: none;
        }
        .philosopher:active { cursor: grabbing; }
        .ai { filter: grayscale(1) opacity(0.7); pointer-events: none; }
        .player { filter: drop-shadow(0 0 8px rgba(0,255,0,0.5)); }

        /* UI */
        #ui-overlay {
            position: absolute; top: 0; width: 100%; text-align: center;
            pointer-events: none; z-index: 100;
        }
        .panel {
            display: inline-block; background: rgba(255,255,255,0.9);
            border: 2px solid #000; padding: 15px; margin-top: 20px;
            pointer-events: auto; border-radius: 10px;
        }
        .btn { background: #000; color: #fff; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        #guide { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div id="game-stage">
    <img id="chair-target" src="image_78211d.jpg" alt="椅子">

    <div id="ui-overlay">
        <div class="panel">
            <div id="status">第 <span id="lv-num">1</span> 关: 动手确证存在</div>
            <div id="guide">按住你的哲学家，把他拖到椅子上！</div>
            <button id="start-btn" class="btn" onclick="initRound()">开始本轮</button>
        </div>
    </div>
</div>

<script>
    let level = 1;
    let isGaming = false;
    let playerObj = null;
    const stage = document.getElementById('game-stage');
    const chair = document.getElementById('chair-target');
    const startBtn = document.getElementById('start-btn');
    
    // 图片资源
    const imgStand = 'image_78215a.png'; 
    const imgSat = 'image_782124.jpg';
    const imgEmptyChair = 'image_78211d.jpg';

    // 拖拽逻辑变量
    let isDragging = false;
    let offset = { x: 0, y: 0 };

    function initRound() {
        startBtn.style.display = 'none';
        isGaming = true;
        
        // 清理旧元素
        document.querySelectorAll('.philosopher').forEach(p => p.remove());
        chair.src = imgEmptyChair;

        // 创建玩家
        playerObj = createPhilosopher(true);
        // 创建AI (数量随等级增加)
        for(let i=0; i < level; i++) {
            createAI();
        }
    }

    function createPhilosopher(isPlayer) {
        const img = document.createElement('img');
        img.src = imgStand;
        img.className = isPlayer ? 'philosopher player' : 'philosopher ai';
        
        // 初始位置：玩家在左下角，AI在右侧
        if(isPlayer) {
            img.style.left = '50px';
            img.style.bottom = '50px';
            addDragListeners(img);
        } else {
            img.style.right = '-150px';
            img.style.top = Math.random() * 70 + '%';
        }
        
        stage.appendChild(img);
        return img;
    }

    function createAI() {
        const ai = createPhilosopher(false);
        // AI 移动逻辑
        const speed = 3 + Math.random() * 4; // 初始速度较慢
        const duration = Math.max(1, speed - (level * 0.3)); // 随等级变快
        
        setTimeout(() => {
            if(!isGaming) return;
            ai.style.transition = `all ${duration}s linear`;
            ai.style.right = '45%';
            ai.style.top = '45%';
            
            // 检查AI是否到达
            const checkInterval = setInterval(() => {
                if(!isGaming) { clearInterval(checkInterval); return; }
                if(isOverlap(ai, chair)) {
                    clearInterval(checkInterval);
                    endGame(false);
                }
            }, 50);
        }, 500);
    }

    function addDragListeners(el) {
        const start = (e) => {
            if(!isGaming) return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            offset.x = clientX - el.offsetLeft;
            offset.y = clientY - el.offsetTop;
        };

        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.left = (clientX - offset.x) + 'px';
            el.style.top = (clientY - offset.y) + 'px';

            // 实时检测碰撞
            if(isOverlap(el, chair)) {
                isDragging = false;
                endGame(true);
            }
        };

        const stop = () => isDragging = false;

        el.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        el.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', stop);
    }

    function isOverlap(obj1, obj2) {
        const r1 = obj1.getBoundingClientRect();
        const r2 = obj2.getBoundingClientRect();
        // 缩小判定范围，让玩家必须把人放到椅子中心附近
        return !(r1.right < r2.left + 50 || 
                 r1.left > r2.right - 50 || 
                 r1.bottom < r2.top + 50 || 
                 r1.top > r2.bottom - 50);
    }

    function endGame(win) {
        isGaming = false;
        chair.src = imgSat;
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        if(win) {
            level++;
            document.getElementById('status').innerText = "胜利！你成功入座。";
            startBtn.innerText = "进入下一关";
        } else {
            level = Math.max(1, level - 1);
            document.getElementById('status').innerText = "太慢了！位置被抢了。";
            startBtn.innerText = "重试本关";
        }
        document.getElementById('lv-num').innerText = level;
        startBtn.style.display = 'inline-block';
    }
</script>

</body>
</html>
