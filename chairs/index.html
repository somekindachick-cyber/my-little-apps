<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存在主义：椅子争夺战 (平衡难度版)</title>
    <style>
        :root { --bg-color: #f5f6fa; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); font-family: "Georgia", serif; }
        
        #game-stage {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #fff;
        }

        #chair {
            position: absolute; width: 220px; z-index: 1;
            transition: transform 0.1s;
        }

        .philosopher {
            position: absolute; width: 140px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        /* 玩家光晕更加柔和 */
        .player { filter: drop-shadow(0 0 10px rgba(46, 204, 113, 0.4)); z-index: 10; }
        .ai { filter: grayscale(0.8) opacity(0.8); }

        .shout {
            position: absolute; background: white; border: 2px solid #000;
            padding: 5px 10px; border-radius: 10px; font-size: 14px;
            white-space: nowrap; pointer-events: none; z-index: 20;
            animation: pop 1.2s forwards;
        }

        @keyframes pop {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            15% { transform: scale(1.1) translateY(-15px); opacity: 1; }
            100% { transform: scale(1) translateY(-35px); opacity: 0; }
        }

        #ui { position: absolute; top: 20px; text-align: center; width: 100%; z-index: 100; }
        .msg-box {
            background: rgba(255,255,255,0.98); padding: 20px; border-radius: 12px;
            display: inline-block; border: 2px solid #333; box-shadow: 6px 6px 0px #333;
        }
        .btn {
            background: #000; color: #fff; border: none; padding: 12px 25px;
            font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
        #timer { font-size: 3rem; font-weight: bold; color: #ff4757; height: 60px; }
        #level-tag { font-weight: bold; color: #2f3542; }
    </style>
</head>
<body>

<div id="game-stage">
    <img id="chair" src="image_78211d.jpg" alt="椅子">
    
    <div id="ui">
        <div class="msg-box">
            <div id="level-tag">第 1 关：孤独的冥想者</div>
            <div id="timer"></div>
            <div id="status">站立意味着无根可依。准备好了吗？</div>
            <button id="start-btn" class="btn" onclick="startGame()">确证存在</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1;
    let isRacing = false;
    let baseTime = 1200; // 核心平衡参数：初始基础时间（毫秒）
    
    const stage = document.getElementById('game-stage');
    const chair = document.getElementById('chair');
    const status = document.getElementById('status');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const levelTag = document.getElementById('level-tag');

    // 图片资源映射
    const imgStand = 'image_78215a.png'; // 站立的老头
    const imgSat = 'image_782124.jpg';  // 坐下的老头
    const imgChairOnly = 'image_78211d.jpg';

    // 优化的关卡配置
    const levelConfigs = [
        { title: "孤独的冥想者", rivals: 1, difficultyBonus: 1.0, respawnOnFail: 1 }, 
        { title: "辩论赛常客", rivals: 1, difficultyBonus: 1.2, respawnOnFail: 1 },
        { title: "虚无主义斗士", rivals: 2, difficultyBonus: 1.4, respawnOnFail: 2 },
        { title: "存在主义大师", rivals: 2, difficultyBonus: 1.6, respawnOnFail: 3 },
        { title: "椅子上的上帝", rivals: 3, difficultyBonus: 2.0, respawnOnFail: 5 }
    ];

    const quotes = [
        "这把椅子属于物自体！",
        "我坐故我在！",
        "上帝也想要这把椅子的！",
        "痛苦只是感官幻觉！",
        "西西弗斯也会羡慕我的！"
    ];

    function startGame() {
        startBtn.style.display = 'none';
        resetRound();
        
        let count = 3;
        timerDisplay.innerText = count;
        
        let countdown = setInterval(() => {
            count--;
            if (count > 0) {
                timerDisplay.innerText = count;
                spawnShout("准备抢夺！");
            } else {
                clearInterval(countdown);
                timerDisplay.innerText = "抢！！！";
                go();
            }
        }, 1000);
    }

    function resetRound() {
        // 重要：所有关卡开始时，哲学家必须是站着的
        document.querySelectorAll('.philosopher, .shout').forEach(p => p.remove());
        chair.src = imgChairOnly;
        
        const configIndex = Math.min(currentLevel - 1, levelConfigs.length - 1);
        const config = levelConfigs[configIndex];
        levelTag.innerText = `第 ${currentLevel} 关：${config.title}`;

        createPhilosopher(true, imgStand); // 使用站立图
        for(let i=0; i < config.rivals; i++) {
            createPhilosopher(false, imgStand);
        }
    }

    function createPhilosopher(isPlayer, imgSrc) {
        const p = document.createElement('img');
        p.src = imgSrc; // 这里使用传入的站立图或坐下图
        p.className = isPlayer ? 'philosopher player' : 'philosopher ai';
        
        const isLeft = Math.random() > 0.5;
        p.style.left = isLeft ? '-150px' : (window.innerWidth + 50) + 'px';
        p.style.top = (20 + Math.random() * 50) + 'vh';
        
        if(isPlayer) p.onclick = () => playerWin();
        stage.appendChild(p);
    }

    function spawnShout(text, element) {
        const shout = document.createElement('div');
        shout.className = 'shout';
        shout.innerText = text || quotes[Math.floor(Math.random() * quotes.length)];
        
        if(element) {
            shout.style.left = element.offsetLeft + 'px';
            shout.style.top = (element.offsetTop - 30) + 'px';
        } else {
            shout.style.left = '50%'; shout.style.top = '50%';
        }
        stage.appendChild(shout);
    }

    function go() {
        isRacing = true;
        const configIndex = Math.min(currentLevel - 1, levelConfigs.length - 1);
        const config = levelConfigs[configIndex];

        // 核心逻辑：AI 点击时间随难度和基础时间动态缩短
        const aiDelay = baseTime / config.difficultyBonus;

        document.querySelectorAll('.philosopher').forEach((p) => {
            if (!p.classList.contains('player')) {
                // 增加一点随机延迟，让 AI 看起来更有机
                const organicDelay = aiDelay + (Math.random() * 300 - 150);
                setTimeout(() => {
                    if(isRacing) {
                        spawnShout(null, p);
                        p.style.left = '45%'; // 冲向中心
                        p.style.top = '45%';
                        
                        setTimeout(() => { if(isRacing) aiWin(); }, 200);
                    }
                }, organicDelay);
            } else {
                // 玩家角色视觉提示
                p.style.transition = "all 0.1s ease";
                p.style.transform = "scale(1.3)";
            }
        });
    }

    function playerWin() {
        if(!isRacing) return;
        isRacing = false;
        shakeChair();
        finishRound("勝利！存在确证了。", true);
    }

    function aiWin() {
        if(!isRacing) return;
        isRacing = false;
        shakeChair();
        finishRound("失败。你是幻觉。", false);
    }

    function shakeChair() {
        chair.style.transform = "scale(1.1) rotate(5deg)";
        setTimeout(() => chair.style.transform = "scale(1) rotate(0deg)", 100);
    }

    function finishRound(text, success) {
        timerDisplay.innerText = "";
        chair.src = imgSat; // 这里切换到坐下的图
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        const configIndex = Math.min(currentLevel - 1, levelConfigs.length - 1);
        const config = levelConfigs[configIndex];

        if (success) {
            currentLevel++;
            status.innerText = text;
            startBtn.innerText = "进入下一阶段";
        } else {
            // 失败时，返回到关卡配置中的特定段位
            currentLevel = config.respawnOnFail;
            status.innerText = text + ` (退回第${currentLevel}关)`;
            startBtn.innerText = "重新来过";
        }
        startBtn.style.display = 'inline-block';
    }
</script>
</body>
</html>
