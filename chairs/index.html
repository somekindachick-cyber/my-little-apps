<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：灵活潜入版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif"; touch-action: none; }
        #game-stage { position: relative; width: 100vw; height: 100vh; background-image: url('image_78211d.jpg'); background-size: cover; background-position: center; }
        #guide-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .philosopher {
            position: absolute; 
            width: 120px; /* 缩小尺寸，提升灵活度 */
            z-index: 10;
            user-select: none; -webkit-user-drag: none;
            transform: translate(-50%, -50%); 
        }

        .player { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); cursor: grab; z-index: 20; }
        .ai { filter: brightness(0.7); pointer-events: none; }

        #ui { position: absolute; top: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000; padding: 10px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 8px 8px 0px #000;
        }
        .btn { background: #000; color: #fff; padding: 12px 35px; border: none; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-stage">
    <canvas id="guide-canvas"></canvas>
    <div id="ui">
        <div class="panel">
            <div id="status">关卡 <span id="lv-num">1</span></div>
            <div id="msg">激光在抖动，那是虚无的不安定。</div>
            <button id="main-btn" class="btn" onclick="initAndStart()">开始挑战</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1, isGaming = false, isDragging = false, audioCtx;
    let playerPos = { x: 0, y: 0 }, chairPos = { x: 0, y: 0 };
    let startMouse = { x: 0, y: 0 }, startObj = { x: 0, y: 0 };
    let lasers = [];

    const stage = document.getElementById('game-stage');
    const canvas = document.getElementById('guide-canvas');
    const ctx = canvas.getContext('2d');
    const msgText = document.getElementById('msg');
    const mainBtn = document.getElementById('main-btn');
    const lvNum = document.getElementById('lv-num');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        chairPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }
    window.addEventListener('resize', resize);
    resize();

    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }

    function startLevel() {
        isGaming = true; isDragging = false;
        mainBtn.style.display = 'none';
        stage.style.backgroundImage = "url('image_78211d.jpg')";
        msgText.innerText = "避开红线，拖动哲学家！";
        
        document.querySelectorAll('.philosopher').forEach(p => p.remove());

        // 初始位置：右下角
        playerPos = { x: window.innerWidth * 0.85, y: window.innerHeight * 0.85 };
        
        playerObj = document.createElement('img');
        playerObj.src = 'image_78215a.png';
        playerObj.className = 'philosopher player';
        playerObj.style.left = playerPos.x + 'px';
        playerObj.style.top = playerPos.y + 'px';
        stage.appendChild(playerObj);
        
        bindDrag(playerObj);

        // 生成红外线
        lasers = [];
        const laserCount = Math.min(8, 2 + currentLevel); 
        for (let i = 0; i < laserCount; i++) {
            lasers.push({
                angle: (Math.PI * 2 / laserCount) * i,
                speed: 0.005 + Math.random() * 0.01 * currentLevel,
                wave: Math.random() * 20, // 抖动幅度
                offset: 0
            });
        }
        render();
    }

    function bindDrag(el) {
        const start = (e) => {
            if (!isGaming) return;
            e.preventDefault();
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startMouse = { x: pos.clientX, y: pos.clientY };
            startObj = { x: playerPos.x, y: playerPos.y };
        };
        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            playerPos.x = startObj.x + (pos.clientX - startMouse.x);
            playerPos.y = startObj.y + (pos.clientY - startMouse.y);
            el.style.left = playerPos.x + 'px';
            el.style.top = playerPos.y + 'px';

            const dist = Math.sqrt(Math.pow(playerPos.x - chairPos.x, 2) + Math.pow(playerPos.y - chairPos.y, 2));
            if (dist < 60) { // 扩大吸附范围，降低难度
                isDragging = false;
                endRound(true);
            }
        };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    function render() {
        if (!isGaming) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 绘制金色引导线
        if (isDragging) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(playerPos.x, playerPos.y);
            ctx.lineTo(chairPos.x, chairPos.y);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.stroke();
        }

        let hitDetected = false;
        const time = Date.now() * 0.002;

        lasers.forEach(laser => {
            laser.angle += laser.speed;
            const shake = Math.sin(time + laser.angle) * laser.wave;
            
            ctx.beginPath();
            ctx.setLineDash([]);
            ctx.moveTo(chairPos.x, chairPos.y);
            
            const lx = chairPos.x + Math.cos(laser.angle + shake/500) * 1500;
            const ly = chairPos.y + Math.sin(laser.angle + shake/500) * 1500;
            ctx.lineTo(lx, ly);
            
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 碰撞检测：点到直线的距离
            const dx = lx - chairPos.x;
            const dy = ly - chairPos.y;
            const dist = Math.abs(dy * playerPos.x - dx * playerPos.y + lx * chairPos.y - ly * chairPos.x) / Math.sqrt(dy * dy + dx * dx);

            // 玩家在起始点或终点时，激光免疫（安全区保护）
            const distToCenter = Math.sqrt(Math.pow(playerPos.x - chairPos.x, 2) + Math.pow(playerPos.y - chairPos.y, 2));
            const distToStart = Math.sqrt(Math.pow(playerPos.x - window.innerWidth * 0.85, 2) + Math.pow(playerPos.y - window.innerHeight * 0.85, 2));

            if (dist < 10 && distToCenter > 100 && distToStart > 100) {
                hitDetected = true;
            }
        });

        if (hitDetected && isGaming) {
            playTone(100, 'sawtooth', 0.3);
            endRound(false);
        }

        requestAnimationFrame(render);
    }

    function endRound(win) {
        if (!isGaming) return;
        isGaming = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        if (win) {
            stage.style.backgroundImage = "url('image_782124.jpg')";
            playTone(600, 'sine', 0.3);
            currentLevel++;
            msgText.innerText = "成功突围！";
        } else {
            msgText.innerText = "触碰激光！重来一次。";
        }
        lvNum.innerText = currentLevel;
        mainBtn.style.display = 'inline-block';
        mainBtn.innerText = win ? "挑战下一关" : "再次尝试";
    }
</script>
</body>
</html>
