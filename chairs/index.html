<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：草地争夺战</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #222; font-family: "serif"; 
            touch-action: none; 
        }
        
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            /* 使用带有椅子的草地图作为全屏背景 */
            background-image: url('image_78211d.jpg');
            background-size: cover;
            background-position: center;
            transition: background-image 0.3s ease-in-out;
        }

        /* 隐藏原始的椅子img标签，因为背景已经带了椅子 */
        /* 但为了碰撞检测方便，我们放一个透明的判定区在中心 */
        #chair-hitbox {
            position: absolute; width: 100px; height: 100px;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
        }

        .philosopher {
            position: absolute; width: 130px; z-index: 10;
            user-select: none; -webkit-user-drag: none;
            transition: transform 0.2s ease;
        }

        /* 玩家：初始位置在右下角 */
        .player {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8));
            cursor: grab;
            right: 5%; bottom: 10%; /* 确认为右下角 */
        }
        .player:active { cursor: grabbing; transform: scale(1.1); }

        /* AI：竞争者 */
        .ai { filter: grayscale(1) contrast(1.2) opacity(0.7); pointer-events: none; }

        /* UI 面板 */
        #ui {
            position: absolute; top: 0; width: 100%; text-align: center;
            pointer-events: none; z-index: 100;
        }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px); border: 2px solid #000;
            padding: 15px 40px; margin-top: 20px; pointer-events: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-radius: 8px;
        }
        .btn { 
            background: #2d3436; color: #fff; padding: 12px 30px; 
            border: none; cursor: pointer; font-size: 18px; 
            border-radius: 4px; transition: 0.3s;
        }
        .btn:hover { background: #000; }
        #level-info { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="chair-hitbox"></div>

    <div id="ui">
        <div class="panel">
            <div id="level-info">关卡 1</div>
            <div id="status">将右下角的哲学家拖向椅子！</div>
            <button id="main-btn" class="btn" onclick="startLevel()">确证存在</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1;
    let isGaming = false;
    let isDragging = false;
    let playerObj, startX, startY, initX, initY;

    const stage = document.getElementById('game-stage');
    const hitbox = document.getElementById('chair-hitbox');
    const statusText = document.getElementById('status');
    const levelText = document.getElementById('level-info');
    const mainBtn = document.getElementById('main-btn');

    function startLevel() {
        isGaming = true;
        isDragging = false;
        mainBtn.style.display = 'none';
        statusText.innerText = "抢占那个位子！";
        
        // 恢复初始背景
        stage.style.backgroundImage = "url('image_78211d.jpg')";
        
        // 清理旧角色
        document.querySelectorAll('.philosopher').forEach(p => p.remove());

        // 生成玩家：固定在右下角
        playerObj = document.createElement('img');
        playerObj.src = 'image_78215a.png';
        playerObj.className = 'philosopher player';
        stage.appendChild(playerObj);
        
        addDragLogic(playerObj);

        // 生成AI：从屏幕左侧或上方滑入
        for (let i = 0; i < currentLevel; i++) {
            createAI(i);
        }
    }

    function createAI(i) {
        const ai = document.createElement('img');
        ai.src = 'image_78215a.png';
        ai.className = 'philosopher ai';
        ai.style.left = '-150px'; 
        ai.style.top = (Math.random() * 60) + '%';
        stage.appendChild(ai);

        const duration = Math.max(0.6, 3.5 - (currentLevel * 0.4));
        
        setTimeout(() => {
            if (!isGaming) return;
            ai.style.transition = `all ${duration}s cubic-bezier(0.1, 0.7, 1.0, 0.1)`;
            ai.style.left = '45%';
            ai.style.top = '45%';
            
            const aiInterval = setInterval(() => {
                if (!isGaming) clearInterval(aiInterval);
                if (isHit(ai)) { clearInterval(aiInterval); endRound(false); }
            }, 50);
        }, 800);
    }

    function addDragLogic(el) {
        const move = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            el.style.left = (initX + (pos.clientX - startX)) + 'px';
            el.style.top = (initY + (pos.clientY - startY)) + 'px';
            el.style.right = 'auto'; // 拖动时解除右偏移限制
            el.style.bottom = 'auto';

            if (isHit(el)) { isDragging = false; endRound(true); }
        };

        const start = (e) => {
            if (!isGaming) return;
            e.preventDefault();
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startX = pos.clientX;
            startY = pos.clientY;
            initX = el.offsetLeft;
            initY = el.offsetTop;
        };

        const stop = () => isDragging = false;

        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchend', stop);
    }

    function isHit(el) {
        const r1 = el.getBoundingClientRect();
        const r2 = hitbox.getBoundingClientRect();
        const dx = (r1.left + r1.width/2) - (r2.left + r2.width/2);
        const dy = (r1.top + r1.height/2) - (r2.top + r2.height/2);
        return Math.sqrt(dx*dx + dy*dy) < 60;
    }

    function endRound(win) {
        if (!isGaming) return;
        isGaming = false;
        
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        if (win) {
            stage.style.backgroundImage = "url('image_782124.jpg')"; // 切换到坐下的全景图
            currentLevel++;
            statusText.innerText = "你是现实的胜利者！";
            mainBtn.innerText = "进入下一关";
        } else {
            statusText.innerText = "被捷足先登了！你落入了虚无。";
            mainBtn.innerText = "重试此关";
        }
        
        levelText.innerText = `关卡 ${currentLevel}`;
        mainBtn.style.display = 'inline-block';
    }
</script>
</body>
</html>
