<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存在主义：轨迹引导版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif"; touch-action: none; }
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('image_78211d.jpg'); 
            background-size: cover; background-position: center;
        }

        /* 引导线画布 */
        #guide-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .shake { animation: shakeAnim 0.3s; }
        @keyframes shakeAnim {
            0% { transform: translate(0,0); }
            25% { transform: translate(6px, 6px); }
            50% { transform: translate(-6px, -6px); }
            100% { transform: translate(0,0); }
        }
        
        #chair-hitbox { position: absolute; width: 20px; height: 20px; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 1; pointer-events: none; }

        .philosopher {
            position: absolute; width: 220px; z-index: 10;
            user-select: none; -webkit-user-drag: none;
            transition: opacity 0.3s;
        }

        .player { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); cursor: grab; z-index: 20; }
        .ai { filter: none; pointer-events: none; }

        #ui { position: absolute; top: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .panel {
            display: inline-block; background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000; padding: 10px 40px; margin-top: 20px;
            pointer-events: auto; box-shadow: 8px 8px 0px #000;
        }
        .btn { background: #000; color: #fff; padding: 12px 35px; border: none; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-stage">
    <canvas id="guide-canvas"></canvas>
    <div id="chair-hitbox"></div>
    <div id="ui">
        <div class="panel">
            <div id="status">关卡 <span id="lv-num">1</span></div>
            <div id="msg">顺着因果线，回到你的位置。</div>
            <button id="main-btn" class="btn" onclick="initAndStart()">确证存在</button>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1;
    let isGaming = false;
    let isDragging = false;
    let playerObj, audioCtx;
    let startX, startY, initX, initY;

    const stage = document.getElementById('game-stage');
    const canvas = document.getElementById('guide-canvas');
    const ctx = canvas.getContext('2d');
    const hitbox = document.getElementById('chair-hitbox');
    const msgText = document.getElementById('msg');
    const mainBtn = document.getElementById('main-btn');
    const lvNum = document.getElementById('lv-num');

    // 适配画布大小
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 音效
    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }

    function startLevel() {
        isGaming = true;
        isDragging = false;
        mainBtn.style.display = 'none';
        msgText.innerText = "追随指引，占据中心。";
        stage.style.backgroundImage = "url('image_78211d.jpg')";
        stage.classList.remove('shake');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        document.querySelectorAll('.philosopher').forEach(p => p.remove());

        // 生成玩家：右下角
        playerObj = document.createElement('img');
        playerObj.src = 'image_78215a.png';
        playerObj.className = 'philosopher player';
        playerObj.style.right = '5%';
        playerObj.style.bottom = '5%';
        stage.appendChild(playerObj);
        
        addDragLogic(playerObj);
        for (let i = 0; i < currentLevel; i++) createAI(i);
        playTone(523, 'sine', 0.2);
    }

    function createAI(i) {
        const ai = document.createElement('img');
        ai.src = 'image_78215a.png';
        ai.className = 'philosopher ai';
        ai.style.left = (Math.random() > 0.5 ? -250 : window.innerWidth + 50) + 'px';
        ai.style.top = Math.random() * 60 + '%';
        stage.appendChild(ai);

        const delay = 800 + Math.random() * 1000; 
        const speed = Math.max(0.4, 2.5 - (currentLevel * 0.2));
        
        setTimeout(() => {
            if (!isGaming) return;
            ai.style.transition = `all ${speed}s cubic-bezier(0.4, 0, 0.2, 1)`;
            ai.style.left = (window.innerWidth/2 - 110) + 'px';
            ai.style.top = (window.innerHeight/2 - 110) + 'px';
            setTimeout(() => { if (isGaming) endRound(false); }, speed * 1000);
        }, delay);
    }

    function drawGuideLine() {
        if (!isDragging || !isGaming) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const r1 = playerObj.getBoundingClientRect();
        const r2 = hitbox.getBoundingClientRect();
        
        const pX = r1.left + r1.width / 2;
        const pY = r1.top + r1.height * 0.75; // 屁股重心
        const cX = r2.left + r2.width / 2;
        const cY = r2.top + r2.height / 2;

        // 绘制虚线
        ctx.beginPath();
        ctx.setLineDash([10, 10]);
        ctx.moveTo(pX, pY);
        ctx.lineTo(cX, cY);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 绘制两端的光点
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
        ctx.beginPath();
        ctx.arc(pX, pY, 5, 0, Math.PI * 2);
        ctx.arc(cX, cY, 8, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(drawGuideLine);
    }

    function addDragLogic(el) {
        const onStart = (e) => {
            if (!isGaming) return;
            e.preventDefault();
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            startX = pos.clientX; startY = pos.clientY;
            initX = el.offsetLeft; initY = el.offsetTop;
            el.style.right = 'auto'; el.style.bottom = 'auto';
            el.style.left = initX + 'px'; el.style.top = initY + 'px';
            drawGuideLine();
        };

        const onMove = (e) => {
            if (!isDragging || !isGaming) return;
            const pos = e.touches ? e.touches[0] : e;
            el.style.left = (initX + (pos.clientX - startX)) + 'px';
            el.style.top = (initY + (pos.clientY - startY)) + 'px';

            if (checkCollision(el)) { isDragging = false; endRound(true); }
        };

        el.addEventListener('mousedown', onStart);
        el.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    function checkCollision(el) {
        const r1 = el.getBoundingClientRect();
        const r2 = hitbox.getBoundingClientRect();
        const dist = Math.sqrt(
            Math.pow((r1.left + r1.width/2) - (r2.left + r2.width/2), 2) +
            Math.pow((r1.top + r1.height * 0.75) - (r2.top + r2.height/2), 2)
        );
        return dist < 45;
    }

    function endRound(win) {
        if (!isGaming) return;
        isGaming = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.querySelectorAll('.philosopher').forEach(p => p.style.opacity = '0');

        if (win) {
            stage.classList.add('shake');
            stage.style.backgroundImage = "url('image_782124.jpg')";
            playTone(880, 'sine', 0.5);
            currentLevel++;
            msgText.innerText = "精准入座！存在得以延续。";
        } else {
            playTone(150, 'sawtooth', 0.5);
            msgText.innerText = "轨迹断裂。虚无占据了中心。";
        }
        lvNum.innerText = currentLevel;
        mainBtn.style.display = 'inline-block';
        mainBtn.innerText = win ? "下一关" : "重试";
    }
</script>
</body>
</html>
