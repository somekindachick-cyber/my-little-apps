<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星战百科·像素全题库版</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-yellow: #ffe81f; --retro-blue: #2e67f8; --retro-red: #f82e2e;
            --bg-dark: #000; --panel-bg: rgba(10, 10, 20, 0.95);
            --success: #00ff41;
        }

        body { 
            font-family: 'VT323', monospace; background-color: var(--bg-dark);
            background-image: radial-gradient(#fff 1px, transparent 1px);
            background-size: 50px 50px; color: #fff;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        .pixel-border {
            border: 4px solid #fff; outline: 4px solid #000;
            box-shadow: 8px 8px 0 0 #333; background: var(--panel-bg);
            padding: 20px; width: 90%; max-width: 450px; position: relative;
        }

        .status-header { display: flex; justify-content: space-between; border-bottom: 4px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .score-num { color: var(--retro-yellow); font-size: 1.5rem; }

        /* 图片显示区域：强制像素化 */
        .img-box { 
            width: 100%; height: 180px; background: #111; border: 2px solid #444;
            display: flex; justify-content: center; align-items: center; margin-bottom: 15px;
        }
        .img-box img { 
            height: 90%; image-rendering: pixelated; 
            transition: opacity 0.2s;
        }

        .question-text { font-size: 1.4rem; min-height: 3.5rem; margin-bottom: 15px; color: #eee; }
        
        .option-btn { 
            background: #000; border: 2px solid #fff; color: #fff; padding: 12px;
            font-family: 'VT323', monospace; font-size: 1.2rem; cursor: pointer;
            width: 100%; text-align: left; margin-bottom: 8px;
        }
        .option-btn:hover { background: var(--retro-blue); color: #fff; }
        .option-btn:active { transform: translate(2px, 2px); }

        .correct { background: var(--success) !important; color: #000 !important; border-color: #000 !important; }
        .wrong { background: var(--retro-red) !important; color: #fff !important; }
        
        #combo-wrap { 
            position: absolute; top: -15px; right: 10px; background: var(--retro-red);
            padding: 2px 10px; border: 2px solid #fff; font-size: 1.2rem; z-index: 100;
        }

        .hidden { display: none; }
        .timer-text { color: var(--retro-red); }
    </style>
</head>
<body>

<div id="quiz-container" class="pixel-border">
    <div id="combo-wrap" class="hidden">COMBO x<span id="combo-num">0</span></div>

    <div id="start-screen" style="text-align: center;">
        <h1 style="color: var(--retro-yellow); font-size: 3.5rem; margin: 0;">DATA BANK</h1>
        <p style="letter-spacing: 2px; color: #888;">PRESS START TO INITIALIZE</p>
        <button class="option-btn" style="text-align: center; margin-top: 2rem;" onclick="initGame()">[ START MISSION ]</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="status-header">
            <div style="color: var(--retro-blue);"><span id="cat-icon"></span> <span id="cat-label">UNIT</span></div>
            <div class="score-num">PTS:<span id="live-score">0000</span></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="prog-label">01/80</span>
            <span class="timer-text">REMAINING: <span id="timer-val">15</span>S</span>
        </div>
        <div class="img-box"><img id="q-img" src="" alt="Pixel Target"></div>
        <div class="question-text" id="q-text">LOADING...</div>
        <div id="opt-box"></div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 id="rank-title" style="color: var(--retro-yellow); font-size: 2.5rem;">MISSION OVER</h2>
        <div style="font-size: 1.5rem;">SCORE: <span id="final-score">0</span></div>
        <p id="rank-msg" style="margin: 20px 0; color: #888;"></p>
        <button class="option-btn" style="text-align: center;" onclick="location.reload()">[ REBOOT SYSTEM ]</button>
    </div>
</div>

let quizDb = [...rawDb];
let cur = 0, totalScore = 0, combo = 0, lock = false, timer, timeLeft = 15;
let preloadedImgs = {}; // 图片缓存对象

// 像素图生成函数：使用 DiceBear 像素艺术 API
function getPixelUrl(pk) {
    // 逻辑：使用专门的像素插画生成接口
    // 这个接口会根据关键词生成更像“东西”的像素图，而不是乱七八糟的摄影图
    // 我们使用了 DiceBear 的像素艺术变体，并增加了背景和复杂度
    const seed = encodeURIComponent(pk);
    return `https://api.dicebear.com/7.x/pixel-art/svg?seed=${seed}&size=128&backgroundColor=b6e3f4,c0aede,d1d4f9&radius=10`;
}

// 预加载逻辑：在后台静默加载
function preload(index) {
    for(let i=index; i<index+5; i++) {
        if(quizDb[i] && !preloadedImgs[i]) {
            const url = getPixelUrl(quizDb[i].pk);
            const img = new Image();
            img.src = url;
            preloadedImgs[i] = url;
        }
    }
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initGame() {
    shuffle(quizDb);
    preload(0); // 初始化时先加载前几个
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    render();
}

function render() {
    if(cur >= quizDb.length) return showResult();
    lock = false; timeLeft = 15;
    const data = quizDb[cur];
    
    // UI 更新
    document.getElementById('cat-icon').innerText = data.icon;
    document.getElementById('cat-label').innerText = data.cat + "_UNIT";
    document.getElementById('prog-label').innerText = `${(cur+1).toString().padStart(2,'0')}/${quizDb.length}`;
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('timer-val').innerText = timeLeft;
    document.getElementById('q-img').src = preloadedImgs[cur] || getPixelUrl(data.pk);

    const box = document.getElementById('opt-box');
    box.innerHTML = '';
    data.a.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = `> ${t}`;
        b.onclick = () => check(i, b);
        box.appendChild(b);
    });

    // 预加载后面的
    preload(cur + 1);

    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-val').innerText = timeLeft;
        if(timeLeft <= 0) { clearInterval(timer); check(-1, null); }
    }, 1000);
}

function check(idx, btn) {
    if(lock) return; lock = true;
    clearInterval(timer);
    const correctIdx = quizDb[cur].c;
    const btns = document.querySelectorAll('.option-btn');
    
    if(idx === correctIdx) {
        combo++;
        btn.classList.add('correct');
        totalScore += (10 + combo * 2 + timeLeft);
    } else {
        combo = 0;
        if(btn) btn.classList.add('wrong');
        btns[correctIdx].classList.add('correct');
    }
    
    document.getElementById('live-score').innerText = totalScore.toString().padStart(4, '0');
    const cw = document.getElementById('combo-wrap');
    if(combo > 1) { 
        cw.classList.remove('hidden'); 
        document.getElementById('combo-num').innerText = combo; 
    } else { cw.classList.add('hidden'); }

    setTimeout(() => { cur++; render(); }, 800); // 缩短等待时间，提升流畅度
}

function showResult() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = totalScore;
    
    let rank = "RECRUIT";
    if(totalScore > 1800) rank = "JEDI MASTER";
    else if(totalScore > 1200) rank = "ELITE PILOT";
    else if(totalScore > 600) rank = "BOUNTY HUNTER";
    
    document.getElementById('rank-title').innerText = rank;
    document.getElementById('rank-msg').innerText = `DATA SYNC COMPLETE. SECTOR SECURED WITH ${totalScore} POINTS.`;
}
</script>
</body>
</html>
