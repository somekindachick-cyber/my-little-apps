<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🦕 恐龙大冒险知识卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:#F5A623; --amber-d:#C47C0A;
    --green:#4CAF50; --green-d:#2E7D32;
    --earth:#5D4037; --earth-d:#3E2723;
    --sand:#FFF8E1;  --card:#FFFDF6;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans SC',sans-serif;min-height:100vh;background:#1B3A2D;overflow-x:hidden;user-select:none;}

  /* jungle bg */
  .bg{position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse 80% 60% at 20% 80%,#0d2b1e 0%,transparent 70%),
               radial-gradient(ellipse 60% 80% at 80% 20%,#1a4a2e 0%,transparent 70%),
               linear-gradient(160deg,#1B3A2D 0%,#142a1f 60%,#0d1f16 100%);}
  .leaf{position:fixed;font-size:2.4rem;opacity:.13;animation:sway 5s ease-in-out infinite;pointer-events:none;z-index:0;}
  .leaf:nth-child(2){top:4%;left:2%;} .leaf:nth-child(3){top:8%;right:3%;font-size:3rem;animation-delay:1.2s;}
  .leaf:nth-child(4){bottom:12%;left:4%;font-size:3.5rem;animation-delay:2.1s;} .leaf:nth-child(5){bottom:6%;right:5%;font-size:2rem;animation-delay:.6s;}
  .leaf:nth-child(6){top:45%;left:1%;font-size:2rem;animation-delay:3s;} .leaf:nth-child(7){top:55%;right:1%;font-size:2.8rem;animation-delay:1.8s;}
  @keyframes sway{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.05)}}

  /* screens */
  .screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px 16px 48px;max-width:640px;margin:0 auto;}

  /* title */
  .t-wrap{text-align:center;margin-bottom:22px;}
  .t-dino{font-size:clamp(3rem,9vw,4.8rem);line-height:1;display:block;animation:bobble 1.8s ease-in-out infinite;}
  @keyframes bobble{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-10px) rotate(4deg)}}
  .t-main{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(1.7rem,6vw,2.5rem);color:#FFD54F;
    text-shadow:3px 4px 0 #7B3F00,0 0 30px rgba(255,213,79,.3);line-height:1.1;letter-spacing:2px;}
  .t-sub{color:#A5D6A7;font-size:.92rem;font-weight:700;margin-top:5px;letter-spacing:1px;}

  /* start card */
  .start-card{background:var(--card);border-radius:28px;padding:26px 22px 22px;width:100%;
    box-shadow:0 10px 0 #3E2723,0 16px 40px rgba(0,0,0,.4);border:3px solid #FFD54F;position:relative;overflow:hidden;}
  .start-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#4CAF50,#FFD54F,#F5A623,#EF5350);}
  .start-card h2{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.32rem;color:#3E2723;text-align:center;margin-bottom:14px;}
  .rules{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px solid #66BB6A;border-radius:16px;
    padding:13px 17px;margin:12px 0 18px;}
  .rules p{font-size:.88rem;font-weight:700;color:#1B5E20;line-height:2.1;}
  .cnt-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .cnt-btn{background:#fff;border:2.5px solid #BCAAA4;border-radius:14px;padding:8px 17px;
    font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:.88rem;color:var(--earth);cursor:pointer;transition:all .15s;}
  .cnt-btn:hover,.cnt-btn.on{background:var(--amber);color:#fff;border-color:var(--amber-d);transform:scale(1.07);box-shadow:0 4px 0 var(--amber-d);}
  .go-btn{width:100%;padding:17px;background:linear-gradient(135deg,#43A047,#66BB6A);border:none;border-radius:20px;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:1.45rem;color:#fff;text-shadow:1px 2px 0 rgba(0,0,0,.2);
    cursor:pointer;letter-spacing:2px;box-shadow:0 6px 0 #1B5E20,0 10px 24px rgba(0,0,0,.3);transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .go-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #1B5E20,0 14px 28px rgba(0,0,0,.35);}
  .go-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1B5E20;}

  /* hud */
  .hud{width:100%;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);border-radius:50px;
    padding:10px 18px;margin-bottom:16px;border:1.5px solid rgba(255,213,79,.25);}
  .hud-s{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.55rem;color:#FFD54F;text-shadow:2px 2px 0 rgba(0,0,0,.3);min-width:68px;}
  .hud-s span{font-size:.62rem;display:block;color:#A5D6A7;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .hud-mid{flex:1;}
  .bar-track{background:rgba(0,0,0,.3);border-radius:20px;height:12px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#66BB6A,#FFD54F);
    box-shadow:0 0 8px rgba(255,213,79,.5);transition:width .5s cubic-bezier(.34,1.56,.64,1);}
  .bar-lbl{font-family:'Baloo 2',cursive;font-size:.68rem;color:#ccc;font-weight:700;text-align:center;margin-top:3px;}
  .hud-c{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.55rem;color:#81C784;text-shadow:2px 2px 0 rgba(0,0,0,.3);min-width:52px;text-align:right;}
  .hud-c span{font-size:.62rem;display:block;color:#A5D6A7;font-weight:700;letter-spacing:1px;}
  .pop{animation:popIt .35s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIt{0%{transform:scale(1)}50%{transform:scale(1.6)}100%{transform:scale(1)}}

  /* question card */
  .q-card{background:var(--card);border-radius:28px;padding:22px 20px 18px;width:100%;
    box-shadow:0 8px 0 #3E2723,0 14px 36px rgba(0,0,0,.4);border:3px solid #FFD54F;position:relative;overflow:hidden;}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#66BB6A,#FFD54F,#F5A623);}
  .q-cat{display:inline-block;background:#5D4037;color:#FFE082;font-size:.67rem;font-weight:900;
    letter-spacing:1.5px;padding:3px 12px;border-radius:20px;text-transform:uppercase;margin-bottom:10px;}
  .q-num{position:absolute;top:15px;right:17px;font-family:'Baloo 2',cursive;font-size:.98rem;color:#F5A623;font-weight:800;}
  .q-icon{font-size:3.2rem;display:block;text-align:center;margin:2px 0 9px;animation:wiggle 2.5s ease-in-out infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .q-text{font-size:clamp(.96rem,3.3vw,1.1rem);font-weight:700;color:#2E1B0E;text-align:center;line-height:1.55;margin-bottom:18px;}

  /* options */
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{background:#fff;border:2.5px solid #D7CCC8;border-radius:16px;padding:12px 10px;text-align:center;
    font-family:'Noto Sans SC',sans-serif;font-size:clamp(.8rem,2.7vw,.93rem);font-weight:700;color:#3E2723;
    cursor:pointer;line-height:1.35;transition:all .17s;box-shadow:0 4px 0 #BCAAA4;-webkit-tap-highlight-color:transparent;}
  .opt-l{display:inline-block;background:var(--amber);color:#fff;width:22px;height:22px;border-radius:50%;
    line-height:22px;font-size:.7rem;font-weight:900;margin-bottom:4px;}
  .opt:hover:not(:disabled){border-color:var(--amber);background:#FFF8E1;transform:translateY(-3px);box-shadow:0 7px 0 var(--amber-d);}
  .opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #BCAAA4;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:linear-gradient(135deg,#C8E6C9,#A5D6A7);border-color:#43A047;box-shadow:0 4px 0 #2E7D32;animation:okBounce .38s ease;}
  @keyframes okBounce{0%{transform:scale(1)}45%{transform:scale(1.08)}100%{transform:scale(1.04)}}
  .opt.wrong{background:linear-gradient(135deg,#FFCDD2,#EF9A9A);border-color:#E53935;box-shadow:0 4px 0 #B71C1C;animation:wrongShk .38s ease;}
  @keyframes wrongShk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  /* feedback */
  .fb{border-radius:16px;padding:12px 15px;margin-top:13px;font-size:.88rem;font-weight:700;line-height:1.6;display:none;}
  .fb.show{display:block;animation:fbSlide .38s cubic-bezier(.34,1.56,.64,1);}
  @keyframes fbSlide{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
  .fb.ok{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px solid #43A047;color:#1B5E20;}
  .fb.nope{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:2px solid #FF9800;color:#E65100;}
  .fb b{font-family:'Baloo 2',cursive;font-size:1.08rem;display:block;margin-bottom:3px;}

  /* next btn */
  .nxt{width:100%;margin-top:13px;background:linear-gradient(135deg,#F5A623,#FFC107);border:none;border-radius:18px;padding:14px;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:1.18rem;color:#3E2723;letter-spacing:1px;
    cursor:pointer;box-shadow:0 5px 0 #C47C0A,0 8px 20px rgba(245,166,35,.35);transition:all .15s;display:none;-webkit-tap-highlight-color:transparent;}
  .nxt.show{display:block;animation:fbSlide .3s ease;}
  .nxt:hover{transform:translateY(-2px);box-shadow:0 7px 0 #C47C0A;}
  .nxt:active{transform:translateY(3px);box-shadow:0 2px 0 #C47C0A;}

  /* star burst */
  .burst{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
  .star{position:absolute;font-size:1.6rem;animation:starFly 1.1s ease-out forwards;}
  @keyframes starFly{0%{opacity:1;transform:scale(0) translateY(0)}55%{opacity:1;transform:scale(1.3) translateY(-70px)}100%{opacity:0;transform:scale(.6) translateY(-130px)}}

  /* result */
  .res-card{background:var(--card);border-radius:28px;padding:34px 24px 26px;width:100%;text-align:center;
    box-shadow:0 10px 0 #3E2723,0 18px 44px rgba(0,0,0,.45);border:3px solid #FFD54F;position:relative;overflow:hidden;}
  .res-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#66BB6A,#FFD54F,#F5A623,#EF5350);}
  .res-emo{font-size:5.2rem;display:block;margin-bottom:9px;animation:bobble 1.8s ease-in-out infinite;}
  .res-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.95rem;color:#3E2723;}
  .res-score{font-family:'Baloo 2',cursive;font-weight:800;font-size:3.8rem;color:var(--amber);text-shadow:3px 4px 0 var(--amber-d);margin:13px 0 3px;}
  .stats{display:flex;justify-content:center;gap:13px;margin:13px 0 18px;}
  .stat{background:#fff;border:2px solid #D7CCC8;border-radius:16px;padding:9px 17px;}
  .stat-n{font-family:'Baloo 2',cursive;font-size:1.75rem;color:var(--green);}
  .stat-l{font-size:.63rem;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:1px;}
  .res-msg{font-size:.92rem;font-weight:700;color:#5D4037;line-height:1.65;margin-bottom:22px;}
  .re-btn{padding:15px 38px;background:linear-gradient(135deg,#43A047,#66BB6A);border:none;border-radius:20px;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:1.35rem;color:#fff;text-shadow:1px 2px 0 rgba(0,0,0,.2);
    letter-spacing:2px;cursor:pointer;box-shadow:0 6px 0 #1B5E20,0 10px 24px rgba(0,0,0,.3);transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .re-btn:hover{transform:translateY(-2px);} .re-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1B5E20;}

  .hidden{display:none!important;}
  @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="leaf">🌿</div><div class="leaf">🍃</div><div class="leaf">🌿</div>
<div class="leaf">🍃</div><div class="leaf">🌱</div><div class="leaf">🌿</div>
<div class="burst" id="burst"></div>

<!-- ══ START ══ -->
<div class="screen" id="S0">
  <div class="t-wrap">
    <span class="t-dino">🦕</span>
    <div class="t-main">恐龙知识大冒险</div>
    <div class="t-sub">探索中生代的奇妙世界！</div>
  </div>
  <div class="start-card">
    <div style="font-size:2.9rem;text-align:center;letter-spacing:10px;margin-bottom:11px">🦖🐊🦅</div>
    <h2>小探险家，准备好了吗？</h2>
    <div class="rules">
      <p>✅ 答对一题 → <strong>+10 分</strong></p>
      <p>❌ 答错不扣分，大胆猜！</p>
      <p>📖 每题都有超有趣的知识点</p>
      <p>🌟 看看你能得多少分！</p>
    </div>
    <div style="font-weight:800;color:#5D4037;margin-bottom:10px;font-size:.88rem;text-align:center">选择题目数量</div>
    <div class="cnt-row">
      <button class="cnt-btn" onclick="setCnt(10,this)">10 题</button>
      <button class="cnt-btn on" onclick="setCnt(20,this)">20 题</button>
      <button class="cnt-btn" onclick="setCnt(40,this)">40 题</button>
      <button class="cnt-btn" onclick="setCnt(80,this)">全部 80 题</button>
    </div>
    <button class="go-btn" onclick="startGame()">🚀 开始冒险！</button>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen hidden" id="S1">
  <div class="t-wrap" style="margin-bottom:13px">
    <span class="t-dino" style="font-size:2.5rem">🦕</span>
    <div class="t-main" style="font-size:1.45rem">恐龙知识大冒险</div>
  </div>
  <div class="hud">
    <div class="hud-s" id="hS"><span>得分</span>0</div>
    <div class="hud-mid">
      <div class="bar-track"><div class="bar-fill" id="hBar" style="width:0%"></div></div>
      <div class="bar-lbl" id="hLbl">0 / 20</div>
    </div>
    <div class="hud-c" id="hC"><span>答对</span>0</div>
  </div>
  <div class="q-card" id="qCard">
    <span class="q-cat" id="qCat">恐龙</span>
    <span class="q-num" id="qNum">1/20</span>
    <span class="q-icon" id="qIco">🦕</span>
    <div class="q-text" id="qTxt"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"><b id="fbT"></b><span id="fbB"></span></div>
    <button class="nxt" id="nxtBtn" onclick="next()">下一题 →</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen hidden" id="S2">
  <div class="t-wrap">
    <span class="t-dino">🏆</span>
    <div class="t-main">冒险结束！</div>
  </div>
  <div class="res-card">
    <span class="res-emo" id="rEmo">🌟</span>
    <div class="res-title" id="rTit">太棒了！</div>
    <div class="res-score" id="rScr">0分</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="rOk">0</div><div class="stat-l">答对</div></div>
      <div class="stat"><div class="stat-n" id="rTot">0</div><div class="stat-l">总题数</div></div>
      <div class="stat"><div class="stat-n" id="rPct">0%</div><div class="stat-l">正确率</div></div>
    </div>
    <div class="res-msg" id="rMsg"></div>
    <button class="re-btn" onclick="restart()">🦕 再玩一次！</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 80-QUESTION BANK
// ════════════════════════════════════════════
const BANK=[
// ─ 三叠纪 ───────────────────────────────────
{c:"三叠纪",i:"🌍",q:"恐龙最早出现在哪个地质时代？",o:["侏罗纪","白垩纪","三叠纪","二叠纪"],a:2,
 f:"恐龙大约在 2.3 亿年前的三叠纪晚期首次出现，是迄今地球上最成功的陆地动物类群！"},
{c:"三叠纪",i:"🌐",q:"三叠纪时，地球上所有大陆连成一块，这块超级大陆叫什么？",o:["阿特拉斯大陆","劳亚大陆","冈瓦纳大陆","盘古大陆"],a:3,
 f:"盘古大陆（Pangaea）在三叠纪是一整块！它慢慢裂开，才形成今天我们熟悉的七大洲。"},
{c:"三叠纪",i:"🦎",q:"已知最古老的恐龙之一——始盗龙，发现于哪个国家？",o:["美国","中国","阿根廷","英国"],a:2,
 f:"始盗龙（Eoraptor）约 2.31 亿年前生活在阿根廷，体长仅约 1 米，是目前已知最早的恐龙之一！"},
{c:"三叠纪",i:"🌊",q:"三叠纪海洋里，外形像海豚的爬行动物叫什么？",o:["沧龙","鱼龙","蛇颈龙","上龙"],a:1,
 f:"鱼龙（Ichthyosaur）是爬行动物，却进化出和海豚极为相似的流线型身体，这叫"趋同进化"！"},
{c:"三叠纪",i:"🐊",q:"和恐龙几乎同时出现、至今仍然存活的"活化石"是？",o:["乌龟","蛇","鳄鱼","蜥蜴"],a:2,
 f:"鳄形动物祖先出现在三叠纪晚期，与恐龙平行演化超过 2 亿年！现代鳄鱼是真正的活化石。"},
{c:"三叠纪",i:"🦕",q:"恐龙出现之前，陆地上最强的猎手是哪类动物？",o:["哺乳动物","劳氏鳄等主龙类","大型两栖动物","大型昆虫"],a:1,
 f:"劳氏鳄（如引鳄）在三叠纪中期是陆地霸主，体长超 6 米！一次火山引发的灭绝事件才让恐龙得以崛起。"},
{c:"三叠纪",i:"🌿",q:"最早的哺乳动物出现在哪个时代？",o:["二叠纪","三叠纪晚期","侏罗纪","白垩纪"],a:1,
 f:"最早的哺乳动物约 2.25 亿年前在三叠纪晚期出现，和恐龙几乎同期！由于恐龙占优，它们长期保持小体型。"},
{c:"三叠纪",i:"🌋",q:"三叠纪结束时发生了什么大事件，让恐龙得以大繁荣？",o:["没什么大事","三叠纪—侏罗纪大灭绝","大冰川时代","海洋全部干涸"],a:1,
 f:"约 2.01 亿年前超级火山大爆发引发大灭绝，消灭了大量竞争者，为恐龙统治侏罗纪铺平了道路！"},

// ─ 侏罗纪 ───────────────────────────────────
{c:"侏罗纪",i:"🦕",q:"腕龙（Brachiosaurus）的前腿和后腿，哪个更长？",o:["后腿","前腿","一样长","只有两条后腿"],a:1,
 f:"腕龙前腿比后腿长，身体向后倾斜，像长颈鹿一样昂首吃高树叶！头可以够到约 12 米高！"},
{c:"侏罗纪",i:"🌿",q:"侏罗纪时期有开花植物吗？",o:["没有，只有蕨类和针叶树","有少量","大量出现","比现在更多"],a:0,
 f:"侏罗纪没有开花植物！地表以蕨类、苏铁和针叶树为主。被子植物（开花植物）要到白垩纪才大量出现！"},
{c:"侏罗纪",i:"🪃",q:"剑龙（Stegosaurus）背上骨板的主要功能是什么？",o:["防弹盔甲","调节体温或展示吸引配偶","攻击天敌","翅膀雏形"],a:1,
 f:"剑龙背板血管丰富，能散热！科学家认为它同时也用于展示，像孔雀的尾巴，颜色可能很鲜艳。"},
{c:"侏罗纪",i:"🧠",q:"剑龙的大脑大约和什么一样大？",o:["橙子","苹果","胡桃","葡萄"],a:2,

// ════════════════════════════════════════════
// GAME
// ════════════════════════════════════════════
let pool=[],idx=0,score=0,correct=0,total=20,answered=false;

function setCnt(n,el){
  total=n;
  document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame(){
  pool=shuffle([...BANK]).slice(0,Math.min(total,BANK.length));
  idx=0;score=0;correct=0;answered=false;
  show('S1');hide('S0');hide('S2');
  updateHUD();render();
}

function render(){
  answered=false;
  const q=pool[idx];
  const card=g('qCard');
  card.style.animation='none';void card.offsetWidth;
  card.style.animation='cardIn .45s cubic-bezier(.34,1.56,.64,1) forwards';

  g('qCat').textContent=q.c;
  g('qIco').textContent=q.i;
  g('qTxt').textContent=q.q;
  g('qNum').textContent=`${idx+1}/${pool.length}`;

  const letters=['A','B','C','D'];
  const grid=g('opts');grid.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<div class="opt-l">${letters[i]}</div><div>${opt}</div>`;
    btn.addEventListener('click',()=>pick(i,btn));
    grid.appendChild(btn);
  });

  g('fb').className='fb';
  g('nxtBtn').className='nxt';
}

function pick(i,btn){
  if(answered)return;
  answered=true;
  const q=pool[idx];
  const isOk=(i===q.a);

  document.querySelectorAll('.opt').forEach((b,j)=>{
    b.disabled=true;
    if(j===q.a)b.classList.add('correct');
  });

  if(isOk){
    btn.classList.add('correct');
    score+=10;correct++;
    burst(btn);
    popEl('hS');popEl('hC');
    showFB(true,q.f);
  }else{
    btn.classList.add('wrong');
    showFB(false,q.f);
  }
  updateHUD();
  g('nxtBtn').className='nxt show';
}

function showFB(ok,text){
  const fb=g('fb');
  g('fbT').textContent=ok?'🎉 太棒了，答对了！':'💡 来看看正确知识！';
  g('fbB').textContent=text;
  fb.className=`fb ${ok?'ok':'nope'} show`;
}

function next(){
  idx++;
  if(idx>=pool.length){showResult();return;}
  updateHUD();render();
}

function updateHUD(){
  g('hS').innerHTML=`<span>得分</span>${score}`;
  g('hC').innerHTML=`<span>答对</span>${correct}`;
  const pct=(idx/pool.length)*100;
  g('hBar').style.width=pct+'%';
  g('hLbl').textContent=`${idx} / ${pool.length}`;
}

function showResult(){
  hide('S1');show('S2');
  const pct=Math.round((correct/pool.length)*100);
  g('rScr').textContent=score+' 分';
  g('rOk').textContent=correct;
  g('rTot').textContent=pool.length;
  g('rPct').textContent=pct+'%';
  let emo,tit,msg;
  if(pct>=90){emo='🏆';tit='恐龙博士！';msg='你简直是古生物小专家！连很多大人都不一定答得上来，太厉害了！';}
  else if(pct>=70){emo='🌟';tit='恐龙探险家！';msg='非常厉害！你已经掌握了很多关于恐龙的知识，继续冒险吧！';}
  else if(pct>=50){emo='🦕';tit='恐龙小学徒！';msg='做得很好！继续练习，你会越来越厉害的，加油！';}
  else{emo='🥚';tit='恐龙蛋孵化中…';msg='没关系！每位恐龙博士都从零开始，再试一次你一定会大进步！';}
  g('rEmo').textContent=emo;
  g('rTit').textContent=tit;
  g('rMsg').textContent=msg;
  for(let i=0;i<24;i++)setTimeout(burstRand,i*110);
}

function restart(){hide('S2');show('S0');}

// helpers
function g(id){return document.getElementById(id);}
function show(id){g(id).classList.remove('hidden');}
function hide(id){g(id).classList.add('hidden');}
function popEl(id){
  const el=g(id);
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});
}
function burst(btn){
  const r=btn.getBoundingClientRect();
  const cx=(r.left+r.width/2)/innerWidth*100;
  const cy=(r.top+r.height/2)/innerHeight*100;
  const em=['⭐','🌟','✨','💫','🌈','🎉'];
  for(let i=0;i<7;i++)setTimeout(()=>spawnStar(cx+(Math.random()-.5)*18,cy+(Math.random()-.5)*18,em[Math.floor(Math.random()*em.length)]),i*70);
}
function burstRand(){
  const em=['⭐','🌟','✨','💫','🦕','🏆','🎊'];
  spawnStar(Math.random()*90+5,Math.random()*70+15,em[Math.floor(Math.random()*em.length)]);
}
function spawnStar(x,y,emoji){
  const el=document.createElement('div');
  el.className='star';el.textContent=emoji;
  el.style.left=x+'%';el.style.top=y+'%';
  el.style.animationDelay=Math.random()*.25+'s';
  g('burst').appendChild(el);
  setTimeout(()=>el.remove(),1400);
}
</script>
