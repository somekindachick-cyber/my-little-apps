<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小小探险家知识卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #0a1628;
  --ocean: #0d3b6e;
  --mid: #1565c0;
  --light: #42a5f5;
  --foam: #e3f2fd;
  --coral: #ff6b6b;
  --gold: #ffd54f;
  --green: #69f0ae;
  --purple: #ce93d8;
  --white: #ffffff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--deep);
  min-height: 100vh;
  font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', cursive;
  overflow-x: hidden;
  position: relative;
}

/* Animated bubbles */
.bubbles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bubble {
  position: absolute;
  bottom: -80px;
  border-radius: 50%;
  background: rgba(66,165,245,0.15);
  border: 1px solid rgba(66,165,245,0.3);
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity:0.6; }
  100% { transform: translateY(-110vh) scale(1.2); opacity:0; }
}

/* Wavy top */
.wave-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: linear-gradient(90deg, var(--light), var(--coral), var(--gold), var(--light));
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
  z-index: 10;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

.container {
  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
header {
  text-align: center;
  padding: 20px 0 10px;
  animation: fadeDown 0.6s ease;
}
.title {
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,213,79,0.5);
  line-height: 1.2;
}
.subtitle { font-size: 1rem; color: var(--light); margin-top: 4px; }

/* Score bar */
.score-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(66,165,245,0.2);
  border-radius: 20px;
  padding: 12px 24px;
  margin: 16px 0;
  animation: fadeUp 0.6s 0.1s both;
}
.score-item { text-align: center; }
.score-num {
  font-size: 2rem;
  color: var(--gold);
  line-height: 1;
}
.score-label { font-size: 0.75rem; color: var(--light); margin-top: 2px; }

/* Category badge */
.cat-badge {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 1rem;
  margin: 8px auto;
  animation: fadeUp 0.4s ease;
}

/* Card */
.card {
  background: linear-gradient(135deg, rgba(21,101,192,0.4), rgba(13,59,110,0.6));
  border: 2px solid rgba(66,165,245,0.25);
  border-radius: 24px;
  padding: 28px 24px;
  margin: 12px 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: cardPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(66,165,245,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.emoji-big {
  font-size: 3.5rem;
  display: block;
  text-align: center;
  margin-bottom: 12px;
  animation: bounce 1s ease infinite alternate;
}
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-6px)} }

.question {
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  color: var(--white);
  text-align: center;
  line-height: 1.5;
  margin-bottom: 24px;
}

/* Options */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.opt-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 16px 10px;
  color: var(--white);
  font-family: inherit;
  font-size: clamp(1rem, 3vw, 1.2rem);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.3;
  position: relative;
  overflow: hidden;
}
.opt-btn:hover:not(:disabled) {
  background: rgba(66,165,245,0.25);
  border-color: var(--light);
  transform: scale(1.03);
}
.opt-btn:active:not(:disabled) { transform: scale(0.97); }
.opt-btn.correct {
  background: rgba(105,240,174,0.25);
  border-color: var(--green);
  color: var(--green);
  animation: correctPulse 0.4s ease;
}
.opt-btn.wrong {
  background: rgba(255,107,107,0.2);
  border-color: var(--coral);
  color: var(--coral);
  animation: shake 0.3s ease;
}
.opt-btn.reveal {
  background: rgba(105,240,174,0.15);
  border-color: rgba(105,240,174,0.4);
  color: var(--green);
}
@keyframes correctPulse { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* Result message */
.result-msg {
  text-align: center;
  font-size: 1.3rem;
  padding: 10px;
  border-radius: 12px;
  margin-top: 16px;
  animation: fadeUp 0.3s ease;
}
.result-msg.correct-msg { color: var(--green); }
.result-msg.wrong-msg { color: var(--coral); }

.fun-fact {
  background: rgba(255,213,79,0.1);
  border: 1px solid rgba(255,213,79,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 12px;
  font-size: 0.95rem;
  color: var(--gold);
  line-height: 1.6;
  animation: fadeUp 0.4s 0.1s both;
}

/* Next button */
.next-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 18px;
  background: linear-gradient(135deg, var(--mid), var(--light));
  border: none;
  border-radius: 16px;
  color: white;
  font-family: inherit;
  font-size: 1.3rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(66,165,245,0.4);
  animation: fadeUp 0.3s 0.2s both;
}
.next-btn:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(66,165,245,0.5); }
.next-btn:active { transform: scale(0.98); }

/* Confetti */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 1s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}

/* Progress bar */
.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  height: 8px;
  margin: 8px 0;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--light), var(--gold));
  border-radius: 10px;
  transition: width 0.5s ease;
}

@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardPop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

.streak-badge {
  display: inline-block;
  background: linear-gradient(135deg, #ff6b6b, #ffd54f);
  color: white;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.9rem;
  margin-left: 8px;
  animation: pulse 0.5s ease;
}
@keyframes pulse { 0%{transform:scale(0.8)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
</style>
</head>
<body>
<div class="wave-top"></div>
<div class="bubbles" id="bubbles"></div>

<div class="container">
  <header>
    <div class="title">🌊 小小探险家 🦕</div>
    <div class="subtitle">快来挑战知识卡片吧！</div>
  </header>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-label">⭐ 总分</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="correctNum">0</div>
      <div class="score-label">✅ 答对</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="totalNum">0</div>
      <div class="score-label">📚 已答</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="streakNum">0</div>
      <div class="score-label">🔥 连对</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div id="cardArea"></div>
  <div class="confetti-wrap" id="confettiWrap"></div>
</div>

<script>
// ============ 题库 500题 ============
const QUESTIONS = [
  // === 海洋 ===
  {cat:"🌊 海洋", emoji:"🐋", q:"蓝鲸是世界上最大的动物，它的心脏大概有多大？", opts:["一个足球大","一辆小汽车那么大","一颗苹果大","一张课桌大"], ans:1, fact:"蓝鲸的心脏重约180千克，跟一辆小汽车差不多重！"},
  {cat:"🌊 海洋", emoji:"🐬", q:"海豚用什么方式找到鱼？", opts:["用鼻子闻","用超声波回声","用眼睛","用触手"], ans:1, fact:"海豚会发出超声波，声音碰到鱼再弹回来，海豚就知道鱼在哪里了！"},
  {cat:"🌊 海洋", emoji:"🦈", q:"大白鲨一生中会换多少颗牙？", opts:["20颗","100颗","数千颗","10颗"], ans:2, fact:"大白鲨一生可以长出超过20000颗牙！它们的牙掉了会不断长出新的。"},
  {cat:"🌊 海洋", emoji:"🐙", q:"章鱼有几个心脏？", opts:["1个","2个","3个","4个"], ans:2, fact:"章鱼有3个心脏！2个负责把血液送到鳃里，1个负责全身。"},
  {cat:"🌊 海洋", emoji:"🦑", q:"章鱼遇到危险时会喷出什么？", opts:["水","墨汁","毒液","沙子"], ans:1, fact:"章鱼会喷出黑色墨汁来迷惑敌人，趁机逃跑！"},
  {cat:"🌊 海洋", emoji:"🐠", q:"小丑鱼住在哪种植物里面？", opts:["珊瑚","海草","海藻","海葵"], ans:3, fact:"小丑鱼住在海葵里！海葵的触手对别的鱼有毒，但小丑鱼身上有特殊保护层。"},
  {cat:"🌊 海洋", emoji:"🦀", q:"螃蟹走路是怎么走的？", opts:["向前走","向后走","横着走","跳着走"], ans:2, fact:"螃蟹的腿的构造让它最容易横着走，这样走起来最快最省力！"},
  {cat:"🌊 海洋", emoji:"🐡", q:"河豚遇到危险时会怎么做？", opts:["快速游走","把身体鼓成球","发出声音","换颜色"], ans:1, fact:"河豚会把肚子吸满水，变成一个带刺的球，让天敌没办法吃它！"},
  {cat:"🌊 海洋", emoji:"⭐", q:"海星如果失去一条腿，会怎样？", opts:["死掉","长出新腿","变成两只","停止游动"], ans:1, fact:"海星有超强的再生能力，断掉的腿可以重新长出来，有些甚至能从一条腿长出一整只新海星！"},
  {cat:"🌊 海洋", emoji:"🐚", q:"珍珠是怎么形成的？", opts:["海浪冲出来的","沙粒进入贝壳后包裹而成","鱼的蛋","海草变的"], ans:1, fact:"当一粒沙子进入蚌的身体，蚌为了保护自己，会用珍珠质把沙子一层层包起来，就变成珍珠了！"},
  {cat:"🌊 海洋", emoji:"🐢", q:"海龟每次呼吸要去哪里？", opts:["水里","水面上","沙滩上","礁石上"], ans:1, fact:"海龟用肺呼吸，要定时游到水面上换气！有些海龟可以憋气长达7小时。"},
  {cat:"🌊 海洋", emoji:"🦭", q:"海豹和海狮最大的区别是什么？", opts:["大小不同","海狮有耳廓海豹没有","颜色不同","海豹会游泳"], ans:1, fact:"海狮有小小的耳廓（外耳），海豹只有耳孔，没有外耳！"},
  {cat:"🌊 海洋", emoji:"🐳", q:"座头鲸唱歌最长能唱多久？", opts:["5分钟","1小时","24小时以上","10分钟"], ans:2, fact:"雄座头鲸的歌声可以持续好几个小时，甚至一整天！它们的歌声能传播数千公里。"},
  {cat:"🌊 海洋", emoji:"🦦", q:"海獭睡觉时为什么要抓住海藻？", opts:["当被子","防止漂走","寻找食物","和朋友牵手"], ans:1, fact:"海獭睡觉时会抓住海藻，防止自己睡着了被海浪冲走。它们有时还会互相牵手！"},
  {cat:"🌊 海洋", emoji:"🐊", q:"世界上最大的珊瑚礁在哪个国家附近？", opts:["中国","美国","澳大利亚","日本"], ans:2, fact:"澳大利亚的大堡礁是世界上最大的珊瑚礁，长达2300公里，在太空都能看见！"},
  {cat:"🌊 海洋", emoji:"🦐", q:"虾是什么颜色的？", opts:["总是红色","活着时多为透明或灰色，煮熟后变红","总是透明的","总是黑色的"], ans:1, fact:"活虾通常是透明的或灰蓝色，虾壳里的色素煮熟后才变成红色！"},
  {cat:"🌊 海洋", emoji:"🐟", q:"飞鱼能飞多远？", opts:["1米","10米","100米以上","500米"], ans:2, fact:"飞鱼能跃出水面滑翔超过100米，最长记录超过400米！它们用尾巴拍打水面加速起飞。"},
  {cat:"🌊 海洋", emoji:"🦁", q:"狮子鱼有什么特别的地方？", opts:["会发光","背鳍有毒刺","会飞","能变色"], ans:1, fact:"狮子鱼的背鳍有毒刺，被刺到非常疼，但它们色彩鲜艳，很漂亮！"},
  {cat:"🌊 海洋", emoji:"🌊", q:"海洋占地球表面积的大约多少？", opts:["30%","50%","71%","90%"], ans:2, fact:"海洋覆盖了地球表面约71%的面积，所以从太空看地球主要是蓝色的！"},
  {cat:"🌊 海洋", emoji:"🐋", q:"独角鲸头上那个长长的东西是什么？", opts:["角","鼻子","牙齿","触角"], ans:2, fact:"独角鲸的角其实是一颗向外旋转生长的长牙，可以长到3米！"},
  {cat:"🌊 海洋", emoji:"🦈", q:"鲨鱼的骨骼是由什么组成的？", opts:["骨头","软骨","石头","木头"], ans:1, fact:"鲨鱼的骨骼不是骨头，而是软骨，比骨头轻得多，帮助它们在水中游动！"},
  {cat:"🌊 海洋", emoji:"🐙", q:"章鱼的血液是什么颜色的？", opts:["红色","蓝色","绿色","透明"], ans:1, fact:"章鱼的血液是蓝色的！因为它们的血液含有铜，而不是铁，铜让血液变成蓝色。"},
  {cat:"🌊 海洋", emoji:"🐠", q:"世界上最毒的鱼叫什么？", opts:["大白鲨","石头鱼","河豚","狮子鱼"], ans:1, fact:"石头鱼是世界上最毒的鱼！它们伪装成岩石，踩上去背鳍会刺入皮肤注入毒素。"},
  {cat:"🌊 海洋", emoji:"🦑", q:"鱿鱼有几条腕？", opts:["6条","8条","10条","12条"], ans:2, fact:"鱿鱼有10条腕，其中8条是触腕，2条是更长的捕食腕！章鱼则只有8条。"},
  {cat:"🌊 海洋", emoji:"🐡", q:"世界上最小的鱼是哪种？", opts:["迷你鲤鱼","矮体陷泥鱼","小丑鱼","灯笼鱼"], ans:1, fact:"矮体陷泥鱼是目前已知最小的鱼，成年后只有约8毫米长，比你的指甲还小！"},
  {cat:"🌊 海洋", emoji:"🌊", q:"深海里最深的地方叫什么？", opts:["马里亚纳海沟","太平洋","大西洋","北冰洋"], ans:0, fact:"马里亚纳海沟是地球上最深的地方，深约11公里，比珠穆朗玛峰还要深！"},
  {cat:"🌊 海洋", emoji:"🦀", q:"寄居蟹为什么要背着贝壳？", opts:["装食物","当房子保护软软的肚子","好看","当武器"], ans:1, fact:"寄居蟹的腹部很软，没有硬壳保护，所以它们借住在空贝壳里当房子！长大后会换更大的壳。"},
  {cat:"🌊 海洋", emoji:"🐬", q:"海豚是鱼还是哺乳动物？", opts:["鱼","哺乳动物","两栖动物","爬行动物"], ans:1, fact:"海豚是哺乳动物！它们用肺呼吸，生出小海豚，用奶喂养宝宝，跟人类是远亲！"},
  {cat:"🌊 海洋", emoji:"⭐", q:"海星有几只眼睛？", opts:["没有眼睛","2只","每条腕末端各有一只","100只"], ans:2, fact:"海星的每条腕末端都有一个眼点，可以感受光线，但视力很差，只能分辨明暗。"},
  {cat:"🌊 海洋", emoji:"🐚", q:"哪种动物是世界上速度最快的鱼？", opts:["金枪鱼","旗鱼","鲨鱼","海豚"], ans:1, fact:"旗鱼是最快的鱼，游速可以达到每小时110公里，比高铁还快！"},
  {cat:"🌊 海洋", emoji:"🦭", q:"海象的长牙有什么用？", opts:["打猎","爬上冰面帮助身体","吃草","游泳"], ans:1, fact:"海象用长牙钩住冰面，帮助沉重的身体爬上去，也用来在同类中显示地位。"},
  {cat:"🌊 海洋", emoji:"🐡", q:"水母有没有大脑？", opts:["有大脑","没有大脑","有两个脑","有小脑"], ans:1, fact:"水母没有大脑、心脏或骨骼！它们的身体95%是水，用神经网络感受周围环境。"},
  {cat:"🌊 海洋", emoji:"🦈", q:"鲸鲨吃什么？", opts:["大鱼","小虾和浮游生物","海豹","海龟"], ans:1, fact:"鲸鲨虽然是最大的鱼，但主要吃小虾、浮游生物和小鱼，对人类很温和！"},

  {cat:"🌊 海洋", emoji:"🌊", q:"红海为什么叫红海？", opts:["海水是红色的","有时大量红色蓝藻繁殖让海面显红色","海底有红色岩石","太阳把它照红了"], ans:1, fact:"红海的名字可能来自其中偶尔大量繁殖的红色蓝藻（束毛藻），让海面呈现红色！平时红海的水是正常的蓝绿色。"},

  {cat:"🦁 动物", emoji:"🐝", q:"蜂王浆（蜂王浆）是用来做什么的？", opts:["酿蜂蜜","喂所有幼虫","只喂蜂王幼虫，让其成为蜂王","建蜂巢"], ans:2, fact:"蜂王浆只喂给被选中的幼虫！普通幼虫吃普通花粉，被选中的幼虫吃蜂王浆，长大后成为蜂王。"},
  {cat:"💡 常识", emoji:"🌈", q:"闪电一次能有多热？", opts:["和烤箱一样热","和太阳表面一样热","比太阳表面还热，约3万℃","和开水一样热"], ans:2, fact:"闪电的温度高达约3万℃，是太阳表面温度（约5500℃）的5倍多！这就是为什么闪电如此致命。"},
  {cat:"🌊 海洋", emoji:"🦈", q:"鲨鱼能睡觉吗？", opts:["不睡觉","能睡觉，以特殊方式休息","一直游动不需要睡觉","只在晚上睡觉"], ans:1, fact:"鲨鱼能以特殊方式休息！有些鲨鱼能让大脑部分休息，同时继续游泳呼吸。部分种类能在海底静止休息。"},

  {cat:"🦁 动物", emoji:"🦋", q:"世界上最大的昆虫是什么？", opts:["大独角仙","巨型竹节虫（一种竹节虫）","蜻蜓","蟑螂"], ans:1, fact:"中国巨竹节虫（尖头竹节虫）是已知最长的昆虫，体长可达62厘米！是真正的昆虫巨人。"},
  {cat:"🌊 海洋", emoji:"🐋", q:"海豚如何表达快乐？", opts:["不会表达情绪","跳跃、击打水面、发出特定声音等","只靠声音","只靠颜色变化"], ans:1, fact:"海豚会跳跃、在水面旋转和击打水面来表达兴奋和快乐！它们也有独特的哨声相互呼唤，像名字一样。"},
  {cat:"💡 常识", emoji:"🌍", q:"南极和北极，哪个更冷？", opts:["北极更冷","一样冷","南极更冷","夏天北极冬天南极"], ans:2, fact:"南极比北极冷得多！南极有大陆，海拔更高，平均气温-57℃；北极是海洋，平均气温约-34℃。"},
  {cat:"🦕 恐龙", emoji:"🦖", q:"棘龙和霸王龙相比，哪个更大？", opts:["霸王龙更大","棘龙更大","一样大","没有办法比较"], ans:1, fact:"棘龙是已知最大的肉食性恐龙，体长可达14-18米，比霸王龙（约12米）大！棘龙生活在水边，以鱼为食。"},
  {cat:"🦁 动物", emoji:"🐸", q:"世界上有多少种蛙类？", opts:["约100种","约500种","超过7000种","约50种"], ans:2, fact:"全球已知蛙类超过7000种！从极地之外的各个大陆都有分布，是脊椎动物中物种多样性很高的一类。"},
  {cat:"🌊 海洋", emoji:"🦀", q:"海洋里有淡水鱼吗？", opts:["没有，鱼只在淡水里","有，有些淡水区域流入海洋","海洋里只有咸水鱼","淡水鱼和咸水鱼能一起住"], ans:2, fact:"海洋本身没有淡水鱼，但河口（河流入海处）有淡水和咸水混合，有些鱼如鲑鱼能在两种水中生活！"},
  {cat:"💡 常识", emoji:"🔥", q:"金属在非常低的温度下会有什么特殊能力？", opts:["变得更重","变成超导体（没有电阻）","变得透明","消失"], ans:1, fact:"某些金属在极低温度下变成超导体，电流通过时完全没有阻力！这个现象正在被用于研究磁悬浮列车和量子计算机。"},
  {cat:"🦁 动物", emoji:"🦅", q:"候鸟迁徙时如何导航？", opts:["靠记忆","靠地球磁场、太阳、星星等多种方式","靠气味","靠领头鸟的眼睛"], ans:1, fact:"候鸟使用多种导航方式：感受地球磁场、用太阳位置判断方向、用星空导航，还记住地标！是天然的导航高手。"},

  {cat:"🦕 恐龙", emoji:"🦕", q:"似鸟龙（Ornithomimus）像什么现代动物？", opts:["鱼","鸵鸟","大象","蜥蜴"], ans:1, fact:"似鸟龙长相和生活方式都很像鸵鸟！它们没有牙齿，用喙吃植物，靠长腿快速奔跑，甚至可能有羽毛。"},
  {cat:"💡 常识", emoji:"💧", q:"云是由什么组成的？", opts:["棉花","水蒸气（小水滴或冰晶）","气体","灰尘"], ans:1, fact:"云是由无数微小的水滴或冰晶聚集而成的！当水蒸气冷却凝结，就形成云朵。看起来软软的，其实是水！"},
  {cat:"🦁 动物", emoji:"🐧", q:"南极企鹅如何保持温暖？", opts:["靠跑步","靠厚毛皮","靠聚集在一起取暖和厚厚的脂肪层","靠吃热食"], ans:2, fact:"企鹅靠聚集取暖！成千上万只企鹅挤在一起，轮流去外圈挡风，内圈的温度可比外面高10-37度！"},
  {cat:"🌊 海洋", emoji:"⭐", q:"海洋中最深的地方有生物吗？", opts:["没有，太暗太冷太深","有，深海有独特的生物群落","只有细菌","只有植物"], ans:1, fact:"即使在马里亚纳海沟最深处，也有生物！深海有独特的鱼类、虾类、细菌等，依靠化学合成能量生存。"},
  {cat:"💡 常识", emoji:"🌍", q:"地球上最长的陆地边界在哪两个国家之间？", opts:["中国和俄罗斯","俄罗斯和哈萨克斯坦","美国和加拿大","阿根廷和智利"], ans:2, fact:"美国和加拿大共享世界上最长的不设防国际边界，长约8891公里！两国关系友好，边界是世界上最和平的边界之一。"},
  {cat:"🦕 恐龙", emoji:"🥚", q:"恐龙的英文名dinosaur来自哪个词？", opts:["拉丁文大蜥蜴","希腊文恐怖的蜥蜴","英文古老的动物","法文巨兽"], ans:1, fact:"Dinosaur来自希腊文，deinos（恐怖的）+ sauros（蜥蜴），是1842年英国科学家理查德·欧文创造的词！"},
  {cat:"🦁 动物", emoji:"🦁", q:"老虎有几种亚种？", opts:["3种","6种（目前尚存）","10种","只有1种"], ans:1, fact:"现存约6个老虎亚种：孟加拉虎、西伯利亚虎、苏门答腊虎、马来虎、印度支那虎、华南虎，其中几种极度濒危！"},
  {cat:"🌊 海洋", emoji:"🐠", q:"什么是珊瑚三角区？", opts:["三角形的岛屿","全球海洋生物多样性最高的地区，在东南亚","三条珊瑚礁","三个大洋交界处"], ans:1, fact:"珊瑚三角区位于东南亚（印尼、菲律宾、巴布亚新几内亚等国周围），是地球上海洋生物最多样的地方，有600多种珊瑚！"},

  {cat:"🦕 恐龙", emoji:"🦕", q:"恐龙化石被发现最多的大洲是哪里？", opts:["欧洲","亚洲","北美洲（包含南美洲也很多）","非洲"], ans:2, fact:"北美洲和亚洲是发现恐龙化石最多的大洲！南美洲也有大量发现，中国的恐龙化石发现也非常丰富。"},
  {cat:"🦁 动物", emoji:"🦦", q:"水獭用石头做什么？", opts:["建巢","打开贝壳等硬壳食物","扔向敌人","挖洞"], ans:1, fact:"水獭会把石头放在肚皮上，用来砸开蛤蜊、海胆等硬壳食物！它们会保留常用的石头，这是工具使用行为。"},

  {cat:"💡 常识", emoji:"☀️", q:"我们用的很多塑料和石油来自哪里？", opts:["地球内部的岩浆","数百万年前的古生物遗骸（化石燃料）","地下水","矿石"], ans:1, fact:"石油和煤炭是古生物（动植物）遗骸在地下经过数百万年高温高压形成的，所以叫化石燃料！"},
  {cat:"🦁 动物", emoji:"🐼", q:"红熊猫（小熊猫）和大熊猫是亲戚吗？", opts:["是，关系很近","不是，它们分属不同科","是同一种动物","是兄弟"], ans:1, fact:"红熊猫和大熊猫不是近亲！红熊猫属于小熊猫科，大熊猫属于熊科，只是都叫熊猫、都爱吃竹子而已。"},
  {cat:"🌊 海洋", emoji:"🦀", q:"寄居蟹会和海葵合作吗？", opts:["不会，它们是敌人","会，海葵趴在寄居蟹壳上，互相保护","海葵会吃寄居蟹","寄居蟹会吃海葵"], ans:1, fact:"寄居蟹和海葵是好搭档！海葵趴在寄居蟹的壳上，用触手保护蟹，寄居蟹带着海葵移动找到更多食物！"},
  {cat:"🦕 恐龙", emoji:"🦖", q:"肿头龙（pachycephalosaurus）的头顶骨有多厚？", opts:["1厘米","10厘米","约25厘米","50厘米"], ans:2, fact:"肿头龙头顶骨厚约25厘米，相当于你的手那么厚！科学家争论它们是否真的用来对撞，因为25厘米骨头很抗撞！"},
  {cat:"💡 常识", emoji:"🌱", q:"世界上最古老的树是什么树，有多少年历史？", opts:["橡树，500年","红杉树，3000年","刺果松，超过5000年","银杏树，1000年"], ans:2, fact:"美国加利福尼亚州的刺果松（狐尾松）是世界上最古老的树，最老的个体超过5000岁！它们在恶劣环境下极其长寿。"},
  {cat:"🌊 海洋", emoji:"🦭", q:"儒艮（Dugong）是什么动物？", opts:["一种大型鱼","海洋哺乳动物，是美人鱼传说原型之一","一种海龟","一种珊瑚"], ans:1, fact:"儒艮是哺乳动物，以海草为食！古代水手可能把它们误认为美人鱼，这可能是美人鱼传说的来源之一。"},
  {cat:"🦁 动物", emoji:"🦓", q:"非洲野狗（非洲猎犬）和普通狗相比？", opts:["是同一种动物","是不同物种，不是家犬的亲戚","非洲野狗是家犬的祖先","没有区别"], ans:1, fact:"非洲野狗是独立物种，不是家犬的亲戚！它们有独特的花色，是非常高效的猎手，捕猎成功率高达80%！"},
  {cat:"💡 常识", emoji:"🌡️", q:"为什么我们要刷牙？", opts:["为了让牙齿好看","清除细菌和食物残渣，防止蛀牙和牙龈病","因为妈妈让刷","让口气清新就好了"], ans:1, fact:"牙齿上的细菌分解食物残渣会产生酸，腐蚀牙齿造成蛀牙！刷牙能清除细菌，保护牙齿健康，一天至少刷两次！"},
  {cat:"🌊 海洋", emoji:"🐡", q:"哪种鱼会爬树？", opts:["金鱼","攀鲈（淡水鱼）","旗鱼","金枪鱼"], ans:1, fact:"攀鲈能用胸鳍在陆地上移动，甚至能爬上低矮的树！它们的特殊鳃能在空气中呼吸，可以在陆地上存活很久。"},
  {cat:"🦕 恐龙", emoji:"🦕", q:"恐龙时代的哺乳动物有多大？", opts:["和现在一样大","大多很小，像鼠类或刺猬一样大","非常巨大","没有哺乳动物"], ans:1, fact:"恐龙时代的哺乳动物大多很小，类似现在的鼠类或刺猬！恐龙灭绝后，哺乳动物才有机会长大、演化多样化。"},
  {cat:"🦁 动物", emoji:"🦅", q:"哪种动物眼睛能向不同方向独立转动？", opts:["老鹰","变色龙","猫头鹰","鱼"], ans:1, fact:"变色龙的两只眼睛可以完全独立转动，左眼看前面，右眼同时看后面！这给了它们几乎360度的视野。"},

  {cat:"🌊 海洋", emoji:"🌊", q:"太平洋有多大？", opts:["和中国一样大","比所有大洲加起来还大","和欧洲一样大","和大西洋一样大"], ans:1, fact:"太平洋的面积比地球上所有大洲加起来还要大！约1.65亿平方公里，是世界上最大的大洋。"},
  {cat:"🦁 动物", emoji:"🐨", q:"哪种动物有最多的牙齿？", opts:["鲨鱼","蜗牛（有成千上万颗微型牙）","大象","河马"], ans:1, fact:"蜗牛的齿舌上有数千颗甚至数万颗微小的牙齿！最多可达25000颗，用来刮食物。"},
  {cat:"🦕 恐龙", emoji:"🥚", q:"飞行的翼龙最大的是哪种？", opts:["翼手龙","风神翼龙","无齿翼龙","双形齿翼龙"], ans:1, fact:"风神翼龙是已知最大的翼龙，翼展可达10-11米，相当于一架小型飞机！它站在地上高度和长颈鹿差不多。"},

// ===== App State =====
let score = 0, correct = 0, total = 0, streak = 0;
let currentQ = null;
let answered = false;
let usedIndexes = new Set();

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function getNext() {
  if (usedIndexes.size >= QUESTIONS.length) usedIndexes.clear();
  let idx;
  do { idx = Math.floor(Math.random() * QUESTIONS.length); }
  while (usedIndexes.has(idx));
  usedIndexes.add(idx);
  return QUESTIONS[idx];
}

function updateScore() {
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('correctNum').textContent = correct;
  document.getElementById('totalNum').textContent = total;
  document.getElementById('streakNum').textContent = streak;
  const pct = Math.min((usedIndexes.size / QUESTIONS.length) * 100, 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

function showCard(q) {
  answered = false;
  currentQ = q;
  const catColors = {
    "🌊 海洋": "#00bcd4",
    "🦕 恐龙": "#8d6e63",
    "🦁 动物": "#66bb6a",
    "💡 常识": "#ffa726"
  };
  const color = catColors[q.cat] || "#42a5f5";

  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div style="text-align:center;margin-bottom:6px">
      <span class="cat-badge" style="background:${color}22;border:1px solid ${color};color:${color}">${q.cat}</span>
    </div>
    <div class="card">
      <span class="emoji-big">${q.emoji}</span>
      <div class="question">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i) => `
          <button class="opt-btn" onclick="choose(${i})" id="opt${i}">${o}</button>
        `).join('')}
      </div>
      <div id="resultArea"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()" style="display:none">下一题 →</button>
  `;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  total++;
  const q = currentQ;
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const ra = document.getElementById('resultArea');
  if (idx === q.ans) {
    score += 10;
    correct++;
    streak++;
    btns[idx].classList.add('correct');
    ra.innerHTML = `
      <div class="result-msg correct-msg">🎉 太棒了！答对了！+10分 ${streak >= 3 ? `<span class="streak-badge">🔥连对${streak}题！</span>` : ''}</div>
      <div class="fun-fact">💡 ${q.fact}</div>
    `;
    if (streak % 5 === 0) shootConfetti(30);
    else shootConfetti(10);
  } else {
    streak = 0;
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('reveal');
    ra.innerHTML = `
      <div class="result-msg wrong-msg">😅 没关系，再学一次！</div>
      <div class="fun-fact">✅ 正确答案：${q.opts[q.ans]}<br>💡 ${q.fact}</div>
    `;
  }

  updateScore();
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() {
  showCard(getNext());
}

function shootConfetti(count) {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#ff2d78','#00ffe7','#ffe600','#a855f7','#ff6b00','#69f0ae'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.width = (Math.random()*10+5)+'px';
      el.style.height = (Math.random()*10+5)+'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random()*0.8+0.6)+'s';
      el.style.animationDelay = (Math.random()*0.3)+'s';
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, i * 30);
  }
}

// Make bubbles
(function() {
  const wrap = document.getElementById('bubbles');
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random()*40+10;
    b.style.width = b.style.height = size+'px';
    b.style.left = Math.random()*100+'vw';
    b.style.animationDuration = (Math.random()*15+8)+'s';
    b.style.animationDelay = (Math.random()*10)+'s';
    wrap.appendChild(b);
  }
})();

// Start
showCard(getNext());
updateScore();
</script>
