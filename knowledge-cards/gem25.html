<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨界百科全书·挑战版</title>
    <style>
        :root {
            --primary: #8b5cf6; --bg: #030712; --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc; --success: #10b981; --error: #ef4444;
        }
        body { 
            font-family: 'PingFang SC', system-ui, sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #030712);
            color: var(--text); display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }
        #quiz-container { 
            background: var(--card); backdrop-filter: blur(15px); padding: 2rem; 
            border-radius: 2rem; width: 90%; max-width: 500px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        /* 顶部状态栏 */
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .score-tag { background: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        
        .img-box { 
            width: 100%; height: 200px; background: #1e293b; border-radius: 1.2rem; 
            margin-bottom: 1.5rem; overflow: hidden; position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 连击特效 */
        #combo-wrap { 
            position: absolute; top: -10px; right: -10px; transform: rotate(15deg);
            background: #f59e0b; color: #000; padding: 5px 15px; border-radius: 10px;
            font-weight: 900; display: none; z-index: 10; animation: bounce 0.4s infinite alternate;
        }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 0.5rem 0 1.5rem; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s linear; }

        .question-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; margin-bottom: 1.5rem; min-height: 3.6rem; }
        .options { display: grid; gap: 0.8rem; }
        .option-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 1rem; border-radius: 1rem; cursor: pointer; 
            text-align: left; transition: all 0.2s; font-size: 1rem;
        }
        .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: var(--primary); }
        .correct { background: var(--success) !important; border-color: #fff; box-shadow: 0 0 15px var(--success); }
        .wrong { background: var(--error) !important; opacity: 0.7; }
        .hidden { display: none; }
        
        @keyframes bounce { from { transform: rotate(15deg) scale(1); } to { transform: rotate(15deg) scale(1.1); } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="combo-wrap">COMBO × <span id="combo-num">0</span></div>

    <div id="start-screen" style="text-align: center;">
        <h1 style="margin-bottom: 0.5rem; letter-spacing: 2px;">百科全书·挑战</h1>
        <p style="color: #94a3b8; margin-bottom: 2rem;">50题跨界随机混抽 · 考查脑回路深度</p>
        <button class="option-btn" style="width: 100%; text-align: center; background: var(--primary);" onclick="initGame()">进入随机挑战</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="status-header">
            <span id="cat-label" style="color: #a78bfa; font-weight: bold;">【分类】</span>
            <div class="score-tag">得分: <span id="live-score">0</span></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #64748b;">
            <span id="prog-label">1/50</span>
            <span>⏱ <span id="timer-text">15</span>s</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        
        <div class="img-box">
            <img id="q-img" src="" alt="题目图片">
        </div>

        <div class="question-text" id="q-text">加载中...</div>
        <div class="options" id="opt-box"></div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2>挑战结束</h2>
        <div style="font-size: 1rem; color: #94a3b8;">你的最终得分</div>
        <div class="score-num" id="final-score" style="font-size: 4rem; font-weight: 800; color: var(--primary);">0</div>
        <p id="rank-msg" style="font-size: 1.2rem; margin-top: 1rem;"></p>
        <button class="option-btn" style="margin-top: 2rem; width: 100%; text-align: center;" onclick="location.reload()">再来一局（题目重新打乱）</button>
    </div>
</div>

// 复制一份数据以便打乱
let quizDb = [...rawDb];
let cur = 0; 
let totalScore = 0; 
let combo = 0;
let lock = false;
let timer;
let timeLeft = 15;

// Fisher-Yates 洗牌算法
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initGame() {
    shuffle(quizDb); // 随机打乱题目顺序
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    render();
}

function render() {
    if(cur >= quizDb.length) return showResult();
    
    lock = false;
    timeLeft = 15;
    const data = quizDb[cur];
    
    // 更新界面
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('cat-label').innerText = `【${data.cat}】`;
    document.getElementById('prog-label').innerText = `${cur + 1} / ${quizDb.length}`;
    document.getElementById('q-img').src = data.img;
    document.getElementById('timer-text').innerText = timeLeft;
    document.getElementById('progress-fill').style.width = '100%';

    const box = document.getElementById('opt-box');
    box.innerHTML = '';
    data.a.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = t;
        b.onclick = () => check(i, b);
        box.appendChild(b);
    });

    // 启动计时器
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-text').innerText = timeLeft;
        document.getElementById('progress-fill').style.width = `${(timeLeft/15)*100}%`;
        if(timeLeft <= 0) {
            clearInterval(timer);
            check(-1, null); // 时间到，强制进入下一题
        }
    }, 1000);
}

function check(idx, btn) {
    if(lock) return; lock = true;
    clearInterval(timer);
    
    const correctIdx = quizDb[cur].c;
    const btns = document.querySelectorAll('.option-btn');
    
    if(idx === correctIdx) {
        // 答对了
        combo++;
        btn.classList.add('correct');
        // 计分公式：基础10分 + 连击加成 + 时间奖励
        let gain = 10 + (combo * 2) + timeLeft;
        totalScore += gain;
        updateCombo();
    } else {
        // 答错了或超时
        combo = 0;
        updateCombo();
        if(btn) btn.classList.add('wrong');
        btns[correctIdx].classList.add('correct');
    }

    document.getElementById('live-score').innerText = totalScore;

    setTimeout(() => {
        cur++;
        render();
    }, 1200);
}

function updateCombo() {
    const wrap = document.getElementById('combo-wrap');
    if(combo > 1) {
        wrap.style.display = 'block';
        document.getElementById('combo-num').innerText = combo;
    } else {
        wrap.style.display = 'none';
    }
}

function showResult() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = totalScore;
    
    let rank;
    if(totalScore > 800) rank = "知识战神：你简直是行走的百科全书！";
    else if(totalScore > 500) rank = "跨界奇才：大部分领域都难不倒你。";
    else if(totalScore > 200) rank = "潜力股：知识面还可以更宽一点。";
    else rank = "纯真少年：建议多看看外面的世界。";
    
    document.getElementById('rank-msg').innerText = rank;
}
</script>
