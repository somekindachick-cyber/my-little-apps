<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星战百科·像素挑战</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 星战经典配色 */
            --retro-yellow: #ffe81f; /* 经典片头黄 */
            --retro-blue: #2e67f8;   /* 军刀蓝 */
            --retro-red: #f82e2e;    /* 帝国红 */
            --bg-dark: #000000;      /* 宇宙深黑 */
            --panel-bg: rgba(20, 20, 30, 0.8); /* 终端面板色 */
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'VT323', 'PingFang SC', monospace; 
            /* 背景换成更有质感的繁星背景 */
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-main); display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden;
            image-rendering: pixelated; /* 关键：强制浏览器使用像素渲染 */
        }

        /* 复古像素边框样式 */
        .pixel-border {
            border: 4px solid var(--retro-yellow);
            /* 使用 box-shadow 模拟像素风格的内外阴影，使其看起来更像16位游戏 */
            box-shadow: 
                inset -4px -4px 0 0 #888, 
                inset 4px 4px 0 0 #fff,
                4px 4px 0 0 #000;
            background: var(--panel-bg);
            border-radius: 0; /* 像素风不需要圆角 */
        }

        #quiz-container { 
            padding: 2rem; 
            width: 90%; max-width: 480px; 
            position: relative;
            box-sizing: border-box;
        }

        /* 顶部状态栏：更有终端感 */
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid var(--retro-blue); padding-bottom: 5px;}
        .score-tag { color: var(--retro-yellow); font-size: 1.2rem; }
        
        .img-box { 
            width: 100%; height: 180px; background: #1a1a1a; 
            margin-bottom: 1.5rem; overflow: hidden; position: relative;
            border: 2px solid #555;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; filter: contrast(120%) brightness(90%); }
        
        /* 连击特效：更复古的霓虹闪烁 */
        #combo-wrap { 
            position: absolute; top: -15px; right: -15px; transform: rotate(10deg);
            background: var(--retro-red); color: #fff; padding: 4px 10px;
            font-weight: bold; font-size: 1.1rem; display: none; z-index: 10; 
            border: 2px solid #fff;
            animation: combo-blink 0.5s infinite;
        }

        /* 计时器：模仿红石/终端数码管 */
        .timer-zone { font-size: 1.2rem; color: var(--retro-red); font-family: monospace; }

        /* 问题文本：加大字号 */
        .question-text { font-size: 1.5rem; line-height: 1.3; margin-bottom: 1.5rem; min-height: 4rem; color: #fff; text-shadow: 1px 1px 0 #000; }
        
        .options { display: grid; gap: 10px; }
        
        /* 选项按钮：重构为像素按钮样式 */
        .option-btn { 
            background: #222; border: 4px solid #444; 
            color: #ccc; padding: 12px; cursor: pointer; 
            text-align: left; transition: none; font-size: 1.2rem;
            font-family: 'VT323', monospace;
            box-shadow: inset -2px -2px 0 0 #111, inset 2px 2px 0 0 #666;
            position: relative;
        }
        .option-btn:hover:not(:disabled) { background: #333; border-color: var(--retro-blue); color: #fff; }
        .option-btn:active:not(:disabled) { top: 2px; box-shadow: inset 2px 2px 0 0 #111, inset -2px -2px 0 0 #666; }

        /* 正确/错误状态 */
        .correct { background: var(--success) !important; border-color: #fff !important; color: #000 !important; text-shadow: none; box-shadow: inset -2px -2px 0 0 #0a0, inset 2px 2px 0 0 #e0ffe0;}
        .wrong { background: var(--retro-red) !important; border-color: #fff !important; color: #fff !important; opacity: 1; box-shadow: inset -2px -2px 0 0 #800, inset 2px 2px 0 0 #ff9090;}
        
        .hidden { display: none; }
        
        /* 开始屏幕特殊样式：模仿片头黄字 */
        #start-screen h1 { 
            color: var(--retro-yellow); 
            font-size: 2.8rem; 
            text-transform: uppercase; 
            margin-bottom: 0;
            text-shadow: 2px 2px 0 #880, 4px 4px 0 #000;
        }
        #start-screen p { color: #888; font-size: 1.1rem; margin-top: 5px; margin-bottom: 2rem; }

        /* 结果屏幕特殊样式 */
        .score-num { font-size: 5rem; color: var(--retro-yellow); text-shadow: 3px 3px 0 #000; margin: 10px 0; }

        @keyframes combo-blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* 去掉原本的圆柱形进度条，只保留数字计时 */
        .progress-bar { display: none; }
    </style>
</head>
<body>

<div id="quiz-container" class="pixel-border">
    <div id="combo-wrap">COMBO x<span id="combo-num">0</span></div>

    <div id="start-screen" style="text-align: center;">
        <h1>百科全书</h1>
        <p>RETR0 QU1Z CHALLENGE</p>
        <button class="option-btn" style="width: 100%; text-align: center; background: #000; border-color: var(--retro-yellow); color: var(--retro-yellow); font-size: 1.5rem;" onclick="initGame()">[ 开始挑战 ]</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="status-header">
            <span id="cat-label">【SYSTEM】</span>
            <div class="score-tag">SCORE: <span id="live-score">0</span></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-size: 1rem; color: #64748b; margin-bottom: 10px;">
            <span id="prog-label">1/50</span>
            <span class="timer-zone">T-MINUS: <span id="timer-text">15</span>s</span>
        </div>
        
        <div class="img-box"><img id="q-img" src="" alt="题目图片"></div>
        <div class="question-text" id="q-text">LOADING...</div>
        <div class="options" id="opt-box"></div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 style="color: var(--retro-blue);">MISSION COMPLETE</h2>
        <div style="font-size: 1rem; color: #888;">FINAL SCORE</div>
        <div class="score-num" id="final-score">0</div>
        <p id="rank-msg" style="font-size: 1.3rem; color: #fff; min-height: 3rem;"></p>
        <button class="option-btn" style="margin-top: 2rem; width: 100%; text-align: center; border-color: var(--retro-blue); color: var(--retro-blue);" onclick="location.reload()">[ 重新开启 ]</button>
    </div>
</div>

let quizDb = [...rawDb];
let cur = 0; 
let totalScore = 0; 
let combo = 0;
let lock = false;
let timer;
let timeLeft = 15;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initGame() {
    shuffle(quizDb);
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    render();
}

function render() {
    if(cur >= quizDb.length) return showResult();
    lock = false;
    timeLeft = 15;
    const data = quizDb[cur];
    
    document.getElementById('q-text').innerText = data.q;
    // 终端风格的分类显示
    document.getElementById('cat-label').innerText = `> ${data.cat.toUpperCase()}_UNIT`;
    document.getElementById('prog-label').innerText = `SECT_${cur + 1}/${quizDb.length}`;
    document.getElementById('q-img').src = data.img;
    document.getElementById('timer-text').innerText = timeLeft;

    const box = document.getElementById('opt-box');
    box.innerHTML = '';
    data.a.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = `[ ${t} ]`; // 像素风按钮文本格式
        b.onclick = () => check(i, b);
        box.appendChild(b);
    });

    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-text').innerText = timeLeft;
        // 像素风去掉了进度条动画，专注于数字计时
        if(timeLeft <= 0) {
            clearInterval(timer);
            check(-1, null);
        }
    }, 1000);
}

function check(idx, btn) {
    if(lock) return; lock = true;
    clearInterval(timer);
    const correctIdx = quizDb[cur].c;
    const btns = document.querySelectorAll('.option-btn');
    
    if(idx === correctIdx) {
        combo++;
        btn.classList.add('correct');
        let gain = 10 + (combo * 2) + timeLeft;
        totalScore += gain;
        updateCombo();
    } else {
        combo = 0;
        updateCombo();
        if(btn) btn.classList.add('wrong');
        btns[correctIdx].classList.add('correct');
    }
    document.getElementById('live-score').innerText = totalScore.toString().padStart(5, '0'); // 得分补零，更有复古感
    setTimeout(() => {
        cur++;
        render();
    }, 1200);
}

function updateCombo() {
    const wrap = document.getElementById('combo-wrap');
    if(combo > 1) {
        wrap.style.display = 'block';
        document.getElementById('combo-num').innerText = combo;
    } else {
        wrap.style.display = 'none';
    }
}

function showResult() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = totalScore;
    
    let rank;
    if(totalScore > 800) rank = "绝地大师：原力与你同在！";
    else if(totalScore > 500) rank = "共和国精英：合格的战士。";
    else if(totalScore > 200) rank = "赏金猎人：还需要更多悬赏练习。";
    else rank = "塔图因农夫：建议去欧比旺那里充充电。";
    
    document.getElementById('rank-msg').innerText = rank;
}
</script>
</body>
</html>
