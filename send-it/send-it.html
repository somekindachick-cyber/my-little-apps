  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    const cfg = {
      apiKey:"AIzaSyCE4bSSDje9IX0CKBvQJCQkcaFn_3nvIpo",
      authDomain:"mood-cb266.firebaseapp.com",
      databaseURL:"https://mood-cb266-default-rtdb.firebaseio.com",
      projectId:"mood-cb266",
      storageBucket:"mood-cb266.firebasestorage.app",
      messagingSenderId:"747559550862",
      appId:"1:747559550862:web:4a5862897d9464cf756edf"
    };
    const app = initializeApp(cfg);
    const db = getDatabase(app);
    const eRef = ref(db,'entries');
    window.fbPush = e => push(eRef, e);
    window.fbUpdate = (id, e) => set(ref(db,'entries/'+id), e);
    window.fbDelete = id => remove(ref(db,'entries/'+id));
    window.fbListen = cb => onValue(eRef, snap => {
      const d = snap.val();
      const list = d ? Object.entries(d).map(([id,v])=>({...v,_id:id})).sort((a,b)=>b.ts-a.ts) : [];
      cb(list);
    });
    window.firebaseReady = true;

  <style>
    :root {
      --pink:#f472b6; --pink-dark:#db2777; --pink-pale:#fce7f3;
      --blue:#38bdf8; --blue-dark:#0284c7;
      --purple:#a78bfa; --purple-dark:#7c3aed;
      --orange:#fb923c; --orange-dark:#c2410c;
      --cream:#fff8f5; --stone:#78716c; --chalk:#fafaf9; --rock:#292524;
      --green:#4ade80; --red:#f87171;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--cream);color:var(--rock);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* ROCK WALL BACKGROUND */
    body { background: #fff8f5; }
    body::before { display: none; }

    .wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 80px;}

    /* NAV */
    .nav-tabs{display:flex;gap:0;margin-bottom:20px;background:white;border-radius:16px;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #f5f5f4;position:sticky;top:10px;z-index:100;}
    .nav-tab{flex:1;padding:10px 4px;border-radius:12px;border:none;background:transparent;cursor:pointer;font-size:0.75rem;font-weight:700;color:var(--stone);font-family:'Noto Sans SC',sans-serif;transition:all 0.2s;text-align:center;}
    .nav-tab.active{background:linear-gradient(135deg,var(--pink),var(--blue));color:white;box-shadow:0 2px 10px rgba(244,114,182,0.3);}
    .nav-tab .ni{display:block;font-size:1.05rem;margin-bottom:2px;}
    .section{display:none;}.section.active{display:block;}

    /* HEADER */
    header{position:relative;padding:48px 0 28px;text-align:center;}
    .header-rope{position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:48px;background:repeating-linear-gradient(to bottom,var(--pink) 0,var(--pink) 6px,var(--blue) 6px,var(--blue) 12px);border-radius:2px;}
    .header-anchor{font-size:1.8rem;display:block;margin-bottom:6px;}
    h1{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:0.12em;line-height:1;background:linear-gradient(135deg,var(--pink-dark),var(--blue-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .tagline{font-size:0.75rem;letter-spacing:0.2em;color:var(--stone);text-transform:uppercase;margin-top:4px;}

    /* PERSON TABS */
    .ptabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
    .ptab{position:relative;padding:10px 6px;border-radius:16px;border:2px solid #e7e5e4;background:white;cursor:pointer;text-align:center;transition:all 0.2s;overflow:hidden;}
    .ptab::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--tc);transform:scaleX(0);transform-origin:left;transition:transform 0.25s;}
    .ptab.active{border-color:var(--tc);box-shadow:0 4px 16px rgba(0,0,0,0.08);}
    .ptab.active::before{transform:scaleX(1);}
    .ptab-icon{font-size:1.4rem;display:block;margin-bottom:2px;}
    .ptab-name{font-size:0.95rem;font-weight:700;color:var(--rock);}
    .ptab-sub{font-size:0.65rem;color:var(--stone);font-family:'Bebas Neue',cursive;letter-spacing:0.08em;}
    .ptab[data-p="西西"]{--tc:var(--pink);}
    .ptab[data-p="小开"]{--tc:var(--blue);}
    .ptab[data-p="晓芸"]{--tc:var(--purple);}

    /* CARD */
    .card{background:white;border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,0.05);border:1px solid #f5f5f4;}
    .card-title{font-family:'Bebas Neue',cursive;font-size:1.05rem;letter-spacing:0.12em;color:var(--stone);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .slabel{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--stone);margin-bottom:10px;font-weight:700;}

    /* CLIMB TYPE TOGGLE */
    .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
    .type-btn{padding:12px;border-radius:14px;border:2px solid #e7e5e4;background:white;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif;}
    .type-btn .type-icon{font-size:1.5rem;display:block;margin-bottom:4px;}
    .type-btn .type-name{font-size:0.9rem;font-weight:700;color:var(--stone);}
    .type-btn .type-sub{font-size:0.68rem;color:#a8a29e;margin-top:2px;}
    .type-btn.selected.boulder{border-color:var(--pink);background:var(--pink-pale);}
    .type-btn.selected.boulder .type-name{color:var(--pink-dark);}
    .type-btn.selected.lead{border-color:var(--blue);background:var(--blue-pale);}
    .type-btn.selected.lead .type-name{color:var(--blue-dark);}

    /* GYM */
    .gym-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}
    .gym-btn{padding:10px 12px;border-radius:12px;border:2px solid #e7e5e4;background:white;cursor:pointer;font-size:0.85rem;font-weight:700;color:var(--stone);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;text-align:center;}
    .gym-btn:hover{border-color:var(--pink);color:var(--pink-dark);}
    .gym-btn.selected{background:var(--pink-pale);border-color:var(--pink);color:var(--pink-dark);}
    .gym-custom-row{display:flex;gap:8px;margin-top:8px;}
    .gym-custom-input{flex:1;padding:8px 12px;border-radius:10px;border:2px solid #e7e5e4;font-family:'Noto Sans SC',sans-serif;font-size:0.85rem;color:var(--rock);background:var(--chalk);}
    .gym-custom-input:focus{outline:none;border-color:var(--pink);}
    .gym-custom-btn{padding:8px 14px;border-radius:10px;border:none;background:var(--pink);color:white;font-weight:700;cursor:pointer;font-size:0.82rem;font-family:'Noto Sans SC',sans-serif;}

    /* HOLDS / MOOD */
    .holds{display:flex;justify-content:space-around;margin-bottom:18px;}
    .hold{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 10px;border-radius:12px;border:2px solid transparent;background:transparent;transition:all 0.15s;}
    .hold-shape{width:40px;height:40px;border-radius:50% 40% 50% 40%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;background:#f5f5f4;}
    .hold-label{font-size:0.62rem;color:var(--stone);font-weight:700;}
    .hold:hover .hold-shape{transform:scale(1.1);background:var(--pink-pale);}
    .hold.selected .hold-shape{background:var(--pink);transform:scale(1.15);box-shadow:0 4px 12px rgba(244,114,182,0.4);}
    .hold.selected{border-color:var(--pink);background:rgba(244,114,182,0.04);}
    .hold.selected .hold-label{color:var(--pink-dark);}

    /* GRADE COUNTER TABLE */
    .grade-table{width:100%;border-collapse:separate;border-spacing:0 6px;margin-bottom:10px;}
    .grade-table th{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);font-weight:700;padding:0 6px 6px;text-align:left;}
    .grade-table th:last-child{text-align:center;}
    .grade-row-tr td{padding:4px 6px;background:var(--chalk);border-radius:0;}
    .grade-row-tr td:first-child{border-radius:10px 0 0 10px;}
    .grade-row-tr td:last-child{border-radius:0 10px 10px 0;}
    .grade-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-family:'Bebas Neue',cursive;font-size:0.95rem;letter-spacing:0.08em;color:white;min-width:52px;text-align:center;}
    .badge-boulder{background:linear-gradient(135deg,var(--pink),#e879f9);}
    .badge-lead{background:linear-gradient(135deg,var(--blue),#6366f1);}

    /* STAR COUNTER */
    .star-counter{display:flex;align-items:center;gap:6px;justify-content:center;}
    .star-minus,.star-plus{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
    .star-minus{background:#fee2e2;color:#991b1b;}
    .star-minus:hover{background:var(--red);color:white;}
    .star-plus{background:#dcfce7;color:#166534;}
    .star-plus:hover{background:var(--green);color:white;}
    .star-display{display:flex;gap:2px;align-items:center;min-width:80px;justify-content:center;}
    .star-filled{color:#f59e0b;font-size:1rem;}
    .star-empty{color:#e7e5e4;font-size:1rem;}
    .star-count-num{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--rock);min-width:20px;text-align:center;}

    textarea{width:100%;background:var(--chalk);border:2px solid #e7e5e4;border-radius:12px;color:var(--rock);padding:12px 14px;font-size:0.88rem;resize:none;height:68px;font-family:'Noto Sans SC',sans-serif;transition:border-color 0.2s;}
    textarea::placeholder{color:#a8a29e;}
    textarea:focus{outline:none;border-color:var(--pink);}

    /* BACKFILL */
    .backfill-toggle{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;border-radius:12px;background:var(--pink-pale);border:2px dashed var(--pink);cursor:pointer;}
    .backfill-toggle-label{font-size:0.82rem;font-weight:700;color:var(--pink-dark);flex:1;}
    .backfill-row{display:none;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;border-radius:12px;background:#fff;border:2px solid #f0abfc;}
    .backfill-row.visible{display:flex;}
    .backfill-row label{font-size:0.78rem;font-weight:700;color:var(--stone);white-space:nowrap;}
    .backfill-date{flex:1;padding:8px 12px;border-radius:10px;border:2px solid #e7e5e4;font-family:'Noto Sans SC',sans-serif;font-size:0.85rem;color:var(--rock);background:var(--chalk);}
    .backfill-date:focus{outline:none;border-color:var(--pink);}

    .save-btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:14px;font-size:1.1rem;font-family:'Bebas Neue',cursive;letter-spacing:0.18em;cursor:pointer;background:linear-gradient(135deg,var(--pink) 0%,var(--blue) 100%);color:white;box-shadow:0 4px 16px rgba(244,114,182,0.3);transition:opacity 0.2s,transform 0.1s;}
    .save-btn:hover{opacity:0.9;transform:translateY(-1px);}
    .save-btn:active{transform:scale(0.98);}

    /* STATS */
    .row-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
    .rtab{padding:6px 14px;border-radius:20px;border:2px solid #e7e5e4;background:white;cursor:pointer;font-size:0.8rem;font-weight:700;color:var(--stone);transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;}
    .rtab.active{background:var(--pink);border-color:var(--pink);color:white;}
    .pstab-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
    .pstab{padding:5px 14px;border-radius:20px;border:2px solid #e7e5e4;background:white;cursor:pointer;font-size:0.8rem;font-weight:700;color:var(--stone);transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;}
    .pstab[data-ps="西西"].active,.pstab[data-ep="西西"].active,.pstab[data-gps="西西"].active{background:var(--pink);border-color:var(--pink);color:white;}
    .pstab[data-ps="小开"].active,.pstab[data-ep="小开"].active,.pstab[data-gps="小开"].active{background:var(--blue);border-color:var(--blue);color:white;}
    .pstab[data-ps="晓芸"].active,.pstab[data-ep="晓芸"].active,.pstab[data-gps="晓芸"].active{background:var(--purple);border-color:var(--purple);color:white;}

    /* type filter in stats */
    .type-filter-row{display:flex;gap:6px;margin-bottom:14px;}
    .tftab{padding:5px 14px;border-radius:20px;border:2px solid #e7e5e4;background:white;cursor:pointer;font-size:0.8rem;font-weight:700;color:var(--stone);transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;}
    .tftab.active.boulder{background:var(--pink);border-color:var(--pink);color:white;}
    .tftab.active.lead{background:var(--blue);border-color:var(--blue);color:white;}
    .tftab.active.all{background:var(--stone);border-color:var(--stone);color:white;}

    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
    .stat-box{background:var(--chalk);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid #f5f5f4;}
    .stat-num{font-family:'Bebas Neue',cursive;font-size:2rem;line-height:1;background:linear-gradient(135deg,var(--pink-dark),var(--blue-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .stat-label{font-size:0.7rem;color:var(--stone);margin-top:3px;font-weight:700;}
    .grade-bars{display:flex;flex-direction:column;gap:8px;}
    .grade-bar-row{display:flex;align-items:center;gap:10px;}
    .grade-bar-label{font-family:'Bebas Neue',cursive;font-size:0.9rem;letter-spacing:0.06em;width:48px;color:var(--stone);flex-shrink:0;}
    .grade-bar-track{flex:1;height:10px;background:#f5f5f4;border-radius:6px;overflow:hidden;}
    .grade-bar-fill{height:100%;border-radius:6px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
    .fill-boulder{background:linear-gradient(to right,var(--pink),#e879f9);}
    .fill-lead{background:linear-gradient(to right,var(--blue),#6366f1);}
    .grade-bar-count{font-size:0.8rem;font-weight:700;color:var(--rock);width:24px;text-align:right;}

    /* GYM STATS */
    .month-selector{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .month-selector select{padding:6px 12px;border-radius:10px;border:2px solid #e7e5e4;background:white;font-family:'Noto Sans SC',sans-serif;font-size:0.82rem;color:var(--rock);cursor:pointer;}
    .month-selector select:focus{outline:none;border-color:var(--pink);}
    .month-label{font-size:0.78rem;color:var(--stone);font-weight:700;}
    .gym-month-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .gym-stat-box{background:var(--chalk);border-radius:14px;padding:14px;border:1px solid #f5f5f4;}
    .gym-stat-name{font-size:0.78rem;font-weight:700;color:var(--rock);margin-bottom:6px;}
    .gym-stat-visits{font-family:'Bebas Neue',cursive;font-size:1.8rem;line-height:1;color:var(--pink-dark);}
    .gym-stat-sub{font-size:0.68rem;color:var(--stone);margin-top:2px;}

    /* TREND */
    .chart-wrap{position:relative;height:180px;}
    .legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--stone);font-weight:700;}
    .legend-dot{width:9px;height:9px;border-radius:50%;}

    /* LOGBOOK */
    .filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
    .filter-btn{padding:5px 12px;border-radius:20px;border:2px solid #e7e5e4;background:white;color:var(--stone);font-size:0.75rem;cursor:pointer;font-weight:700;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;}
    .filter-btn.active{background:var(--pink);border-color:var(--pink);color:white;}

    .entries{display:flex;flex-direction:column;gap:10px;max-height:540px;overflow-y:auto;padding-right:2px;}
    .entries::-webkit-scrollbar{width:4px;}
    .entries::-webkit-scrollbar-thumb{background:#e7e5e4;border-radius:4px;}

    .entry{background:var(--chalk);border-radius:14px;padding:14px;border:2px solid #f5f5f4;border-left:4px solid var(--ec);animation:slideUp 0.2s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .entry-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
    .entry-mood{width:32px;height:32px;border-radius:50% 40% 50% 40%;background:var(--ec);display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;}
    .entry-name{font-size:0.75rem;font-weight:700;color:var(--ec);font-family:'Bebas Neue',cursive;letter-spacing:0.08em;}
    .entry-gym{font-size:0.68rem;background:#f5f5f4;padding:2px 8px;border-radius:8px;color:var(--stone);font-weight:700;}
    .entry-type{font-size:0.68rem;padding:2px 8px;border-radius:8px;font-weight:700;color:white;}
    .entry-type.boulder{background:var(--pink);}
    .entry-type.lead{background:var(--blue);}
    .entry-date{font-size:0.68rem;color:#a8a29e;margin-left:auto;}
    .entry-backfill{font-size:0.62rem;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:6px;font-weight:700;}
    .entry-grades-summary{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
    .egs-chip{font-size:0.72rem;padding:2px 8px;border-radius:8px;font-weight:700;color:white;display:flex;align-items:center;gap:3px;}
    .egs-chip.boulder{background:linear-gradient(135deg,var(--pink),#e879f9);}
    .egs-chip.lead{background:linear-gradient(135deg,var(--blue),#6366f1);}
    .entry-note{font-size:0.82rem;color:#57534e;margin-bottom:6px;}
    .entry-actions{display:flex;gap:6px;}
    .ea-btn{padding:3px 10px;border-radius:8px;border:none;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;}
    .ea-edit{background:#e0f2fe;color:var(--blue-dark);}
    .ea-edit:hover{background:var(--blue);color:white;}
    .ea-del{background:#fee2e2;color:#991b1b;}
    .ea-del:hover{background:var(--red);color:white;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal{background:white;border-radius:20px;padding:24px;width:100%;max-width:480px;margin:auto;}
    .modal-title{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:0.1em;color:var(--stone);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .modal-field{margin-bottom:14px;}
    .modal-label{font-size:0.75rem;font-weight:700;color:var(--stone);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;display:block;}
    .modal-input{width:100%;padding:9px 12px;border-radius:10px;border:2px solid #e7e5e4;font-family:'Noto Sans SC',sans-serif;font-size:0.88rem;color:var(--rock);background:var(--chalk);}
    .modal-input:focus{outline:none;border-color:var(--pink);}
    .modal-btns{display:flex;gap:10px;margin-top:18px;}
    .modal-save{flex:1;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--blue));color:white;font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:0.12em;cursor:pointer;}
    .modal-cancel{padding:12px 18px;border:2px solid #e7e5e4;border-radius:12px;background:white;color:var(--stone);font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:0.12em;cursor:pointer;}

    .empty{text-align:center;color:#a8a29e;padding:28px 0;font-size:0.88rem;}
    .sync-status{font-size:0.7rem;color:#a8a29e;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:#a8a29e;flex-shrink:0;}
    .sync-status.connected .sync-dot{background:var(--green);}
    .sync-status.connected{color:#16a34a;}
    .chalk-deco{text-align:center;font-size:0.72rem;color:#d6d3d1;letter-spacing:0.2em;text-transform:uppercase;padding:16px 0 4px;font-family:'Bebas Neue',cursive;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 22px;border-radius:30px;font-size:0.85rem;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--blue));color:white;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(244,114,182,0.4);z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .divider{height:1px;background:#f5f5f4;margin:14px 0;}
  </style>
</head>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

const PEOPLE = ['西西','小开','晓芸'];
const COLORS = {'西西':'#f472b6','小开':'#38bdf8','晓芸':'#a78bfa'};
const EMOJIS = ['😞','😕','😐','😊','🤩'];
const BOULDER_GRADES = ['V0','V1','V2','V3','V4','V5'];
const LEAD_GRADES = ['5.6','5.7','5.8','5.9','5.10a','5.10b','5.10c','5.10d','5.11a'];

let currentPerson = '西西';
let selectedMood = 0, selectedGym = '', selectedType = 'boulder';
let gradeCounts = {}; // {grade: count}
let currentFilter = '全部';
let currentPeriod = 'session';
let statsPerson = '西西', statsType = 'all';
let gymStatsPerson = '西西';
let allEntries = [];
let trendChart;
let editGym='', editMood=0, editType='boulder', editGradeCounts={};

// ── INIT GRADE TABLE ──
function getGrades(type) { return type==='boulder' ? BOULDER_GRADES : LEAD_GRADES; }

function buildGradeTable(tbodyId, type, counts, prefix) {
  const tbody = document.getElementById(tbodyId);
  const grades = getGrades(type);
  tbody.innerHTML='';
  grades.forEach(g => {
    const cnt = counts[g]||0;
    const tr = document.createElement('tr');
    tr.className='grade-row-tr';
    tr.innerHTML=`
      <td><span class="grade-badge badge-${type}">${g}</span></td>
      <td>
        <div class="star-counter">
          <button class="star-minus" onclick="${prefix}Dec('${g}')">−</button>
          <div class="star-display" id="${prefix}stars_${g}">${renderStars(cnt)}</div>
          <span class="star-count-num" id="${prefix}num_${g}">${cnt}</span>
          <button class="star-plus" onclick="${prefix}Inc('${g}')">+</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

function renderStars(n) {
  const max=5;
  let s='';
  for(let i=0;i<Math.min(n,max);i++) s+='<span class="star-filled">★</span>';
  for(let i=Math.min(n,max);i<max;i++) s+='<span class="star-empty">★</span>';
  if(n>max) s+=`<span style="font-size:0.7rem;color:var(--stone);font-weight:700;">+${n-max}</span>`;
  return s;
}

function updateStarDisplay(prefix, g, cnt) {
  const sd=document.getElementById(`${prefix}stars_${g}`);
  const sn=document.getElementById(`${prefix}num_${g}`);
  if(sd) sd.innerHTML=renderStars(cnt);
  if(sn) sn.textContent=cnt;
}

// log form grade controls
window.logInc = function(g){ gradeCounts[g]=(gradeCounts[g]||0)+1; updateStarDisplay('log',g,gradeCounts[g]); }
window.logDec = function(g){ gradeCounts[g]=Math.max(0,(gradeCounts[g]||0)-1); updateStarDisplay('log',g,gradeCounts[g]); }
// edit form grade controls
window.editInc = function(g){ editGradeCounts[g]=(editGradeCounts[g]||0)+1; updateStarDisplay('edit',g,editGradeCounts[g]); }
window.editDec = function(g){ editGradeCounts[g]=Math.max(0,(editGradeCounts[g]||0)-1); updateStarDisplay('edit',g,editGradeCounts[g]); }

function initLogGradeTable() {
  gradeCounts={};
  buildGradeTable('gradeTableBody', selectedType, gradeCounts, 'log');
  document.getElementById('gradeTypeLabel').textContent = selectedType==='boulder'?'（抱石）':'（难度）';
  document.getElementById('gradeTypeLabel').style.color = selectedType==='boulder'?'var(--pink)':'var(--blue)';
}

// ── TYPE TOGGLE ──
document.querySelectorAll('.type-btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn[data-type]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedType = btn.dataset.type;
    initLogGradeTable();
  });
});
document.querySelectorAll('.type-btn[data-etype]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn[data-etype]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    editType = btn.dataset.etype;
    editGradeCounts={};
    buildGradeTable('editGradeTableBody', editType, editGradeCounts, 'edit');
  });
});

// ── NAV ──
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('sec-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='stats') renderStats();
    if(btn.dataset.tab==='trend') renderChart();
  });
});

// ── PERSON TABS ──
document.querySelectorAll('.ptab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentPerson = tab.dataset.p;
    resetLogForm();
    document.getElementById('inputLabel').textContent=`今天${currentPerson}在哪里爬？`;
  });
});

function resetLogForm() {
  selectedMood=0; selectedGym=''; gradeCounts={};
  document.querySelectorAll('.hold[data-v]').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.gym-btn[data-gym]').forEach(b=>b.classList.remove('selected'));
  document.getElementById('gymCustom').value='';
  document.getElementById('note').value='';
  document.getElementById('bfDate').value='';
  document.getElementById('bfRow').classList.remove('visible');
  initLogGradeTable();
}

// ── GYM ──
document.querySelectorAll('.gym-btn[data-gym]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gym-btn[data-gym]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGym=btn.dataset.gym;
    document.getElementById('gymCustom').value='';
  });
});
function selectCustomGym() {
  const v=document.getElementById('gymCustom').value.trim();
  if(!v)return;
  document.querySelectorAll('.gym-btn[data-gym]').forEach(b=>b.classList.remove('selected'));
  selectedGym=v; showToast(`岩馆：${v}`);
}

// ── HOLDS ──
document.querySelectorAll('.hold[data-v]').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedMood=+btn.dataset.v;
    document.querySelectorAll('.hold[data-v]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

// ── BACKFILL ──
function toggleBackfill() {
  const row=document.getElementById('bfRow');
  row.classList.toggle('visible');
  document.getElementById('bfIcon').textContent=row.classList.contains('visible')?'▼':'▶';
}

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    renderEntries();
  });
});

// ── PERIOD + STATS PERSON + TYPE FILTER ──
document.querySelectorAll('.rtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod=btn.dataset.period; renderStats();
  });
});
document.querySelectorAll('.pstab[data-ps]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pstab[data-ps]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsPerson=btn.dataset.ps; renderStats();
  });
});
document.querySelectorAll('.tftab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tftab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsType=btn.dataset.tf; renderStats();
  });
});
document.querySelectorAll('.pstab[data-gps]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pstab[data-gps]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    gymStatsPerson=btn.dataset.gps; renderGymStats();
  });
});

// ── SAVE ──
document.getElementById('saveBtn').addEventListener('click', () => {
  if(!selectedMood){ showToast('先选择今天的心情 🪨'); return; }
  if(!selectedGym){ showToast('先选择今天去的岩馆 🏟️'); return; }
  if(!window.fbPush){ showToast('连接中，请稍候…'); return; }
  const total = Object.values(gradeCounts).reduce((s,v)=>s+v,0);
  if(total===0){ showToast('至少记录一条线路吧 💪'); return; }
  const dateInput=document.getElementById('bfDate').value;
  const now=dateInput?new Date(dateInput+'T12:00:00'):new Date();
  const entry=buildEntry(currentPerson, now, selectedGym, selectedType, selectedMood, {...gradeCounts}, document.getElementById('note').value.trim(), !!dateInput);
  window.fbPush(entry);
  resetLogForm();
  showToast(dateInput?`✅ 补录成功！${currentPerson} ${entry.date}`:`SEND! ${currentPerson}的记录已保存 🎉`);
});

function buildEntry(person, d, gym, type, mood, grades, note, isBackfill) {
  return {
    person, gym, type, mood, grades, note,
    ts: d.getTime(),
    date: d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    yearMonth:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
    week: getWeekKey(d),
    year: String(d.getFullYear()),
    backfill: isBackfill||false
  };
}

function getWeekKey(d) {
  const s=new Date(d); s.setHours(0,0,0,0); s.setDate(s.getDate()-s.getDay());
  return `${s.getFullYear()}-${s.getMonth()}-W${s.getDate()}`;
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── RENDER ENTRIES ──
function renderEntries() {
  const filtered=currentFilter==='全部'?allEntries:allEntries.filter(e=>e.person===currentFilter);
  const container=document.getElementById('entries');
  container.innerHTML='';
  if(!filtered.length){container.innerHTML='<div class="empty">还没有记录，开始你的第一条路线！🧗</div>';return;}
  filtered.forEach(e => {
    const div=document.createElement('div');
    div.className='entry';
    div.style.setProperty('--ec',COLORS[e.person]||'#a8a29e');
    // grade summary chips
    const gradeChips = e.grades ? Object.entries(e.grades).filter(([,v])=>v>0).map(([g,v])=>`<span class="egs-chip ${e.type||'boulder'}">${g}×${v}</span>`).join('') : '';
    const typeLabel = e.type==='lead'?'难度':'抱石';
    div.innerHTML=`
      <div class="entry-top">
        <div class="entry-mood">${EMOJIS[(e.mood||1)-1]}</div>
        <span class="entry-name">${e.person}</span>
        ${e.gym?`<span class="entry-gym">${e.gym}</span>`:''}
        <span class="entry-type ${e.type||'boulder'}">${typeLabel}</span>
        ${e.backfill?'<span class="entry-backfill">补录</span>':''}
        <span class="entry-date">${e.date}</span>
      </div>
      ${gradeChips?`<div class="entry-grades-summary">${gradeChips}</div>`:''}
      ${e.note?`<div class="entry-note">${e.note}</div>`:''}
      <div class="entry-actions">
        <button class="ea-btn ea-edit" onclick="openEdit('${e._id}')">✏️ 编辑</button>
        <button class="ea-btn ea-del" onclick="deleteEntry('${e._id}','${e.person}')">🗑 删除</button>
      </div>`;
    container.appendChild(div);
  });
}

// ── DELETE ──
function deleteEntry(id, person) {
  if(!confirm(`确定要删除 ${person} 的这条记录吗？`))return;
  window.fbDelete(id); showToast('已删除 🗑');
}

// ── EDIT MODAL ──
function openEdit(id) {
  const e=allEntries.find(x=>x._id===id);
  if(!e)return;
  document.getElementById('editId').value=id;
  const d=new Date(e.ts);
  document.getElementById('editDate').value=d.toISOString().slice(0,10);
  // person
  document.querySelectorAll('.pstab[data-ep]').forEach(b=>b.classList.toggle('active',b.dataset.ep===e.person));
  // type
  editType=e.type||'boulder';
  document.querySelectorAll('.type-btn[data-etype]').forEach(b=>{
    b.classList.toggle('selected',b.dataset.etype===editType);
  });
  // gym
  editGym=e.gym||'';
  const GYMS=['EDGE','CAMP4三里屯','CAMP4将台','BLOC1'];
  document.querySelectorAll('.gym-btn[data-mgym]').forEach(b=>b.classList.toggle('selected',b.dataset.mgym===e.gym));
  document.getElementById('editGymCustom').value=GYMS.includes(e.gym)?'':(e.gym||'');
  // mood
  editMood=e.mood||0;
  document.querySelectorAll('.hold[data-ev]').forEach(b=>b.classList.toggle('selected',+b.dataset.ev===editMood));
  // grades
  editGradeCounts={...e.grades};
  buildGradeTable('editGradeTableBody',editType,editGradeCounts,'edit');
  // note
  document.getElementById('editNote').value=e.note||'';
  document.getElementById('editModal').classList.add('open');
}

function closeModal(){document.getElementById('editModal').classList.remove('open');}

document.querySelectorAll('.gym-btn[data-mgym]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.gym-btn[data-mgym]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); editGym=btn.dataset.mgym;
    document.getElementById('editGymCustom').value='';
  });
});
document.querySelectorAll('.pstab[data-ep]').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('.pstab[data-ep]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');});
});
document.querySelectorAll('.hold[data-ev]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    editMood=+btn.dataset.ev;
    document.querySelectorAll('.hold[data-ev]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

function saveEdit() {
  const id=document.getElementById('editId').value;
  const orig=allEntries.find(x=>x._id===id);
  if(!id||!orig)return;
  const person=document.querySelector('.pstab[data-ep].active')?.dataset.ep||orig.person;
  const gymCustom=document.getElementById('editGymCustom').value.trim();
  const gym=gymCustom||editGym||orig.gym;
  const mood=editMood||orig.mood;
  const note=document.getElementById('editNote').value.trim();
  const dateVal=document.getElementById('editDate').value;
  const d=dateVal?new Date(dateVal+'T12:00:00'):new Date(orig.ts);
  const updated=buildEntry(person,d,gym,editType,mood,{...editGradeCounts},note,orig.backfill);
  window.fbUpdate(id,updated); closeModal(); showToast('已保存修改 ✅');
}

document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeModal();});

// ── RENDER STATS ──
function renderStats() {
  const now=new Date();
  let base=allEntries.filter(e=>e.person===statsPerson);
  if(statsType!=='all') base=base.filter(e=>(e.type||'boulder')===statsType);

  let filtered=base;
  if(currentPeriod==='session'){
    if(base.length){const ld=base[0].date?base[0].date.slice(0,5):'';filtered=base.filter(e=>e.date&&e.date.startsWith(ld));}
  } else if(currentPeriod==='week'){
    const wk=getWeekKey(now); filtered=base.filter(e=>e.week===wk);
  } else if(currentPeriod==='month'){
    const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`; filtered=base.filter(e=>e.yearMonth===ym);
  } else if(currentPeriod==='year'){
    filtered=base.filter(e=>e.year===String(now.getFullYear()));
  }

  // Grade counts across all entries in filtered
  const allGrades = statsType==='lead' ? LEAD_GRADES : statsType==='boulder' ? BOULDER_GRADES : [...BOULDER_GRADES,...LEAD_GRADES];
  const gc={}; allGrades.forEach(g=>gc[g]=0);
  let total=0;
  filtered.forEach(e=>{
    if(e.grades) Object.entries(e.grades).forEach(([g,v])=>{if(gc[g]!==undefined){gc[g]+=(v||0);total+=(v||0);}});
  });

  const days=new Set(filtered.map(e=>e.date?e.date.slice(0,5):'').filter(Boolean));

  // Best grade
  let best='—';
  const boulderBest=BOULDER_GRADES.slice().reverse().find(g=>gc[g]>0);
  const leadBest=LEAD_GRADES.slice().reverse().find(g=>gc[g]>0);
  if(statsType==='boulder') best=boulderBest||'—';
  else if(statsType==='lead') best=leadBest||'—';
  else best=leadBest||boulderBest||'—';

  document.getElementById('statTotal').textContent=total;
  document.getElementById('statSessions').textContent=days.size;
  document.getElementById('statBest').textContent=best;

  const maxCount=Math.max(...Object.values(gc),1);
  const bars=document.getElementById('gradeBars'); bars.innerHTML='';

  // Show boulder grades
  if(statsType!=='lead'){
    if(statsType==='all'){bars.innerHTML+='<div style="font-size:0.72rem;font-weight:700;color:var(--pink);letter-spacing:0.1em;text-transform:uppercase;margin:4px 0 6px;">🪨 抱石</div>';}
    BOULDER_GRADES.forEach(g=>{
      const pct=Math.round((gc[g]/maxCount)*100);
      bars.innerHTML+=`<div class="grade-bar-row"><div class="grade-bar-label">${g}</div><div class="grade-bar-track"><div class="grade-bar-fill fill-boulder" style="width:${pct}%"></div></div><div class="grade-bar-count">${gc[g]}</div></div>`;
    });
  }
  // Show lead grades
  if(statsType!=='boulder'){
    if(statsType==='all'){bars.innerHTML+='<div style="font-size:0.72rem;font-weight:700;color:var(--blue);letter-spacing:0.1em;text-transform:uppercase;margin:10px 0 6px;">🧗 难度</div>';}
    LEAD_GRADES.forEach(g=>{
      const pct=Math.round((gc[g]/maxCount)*100);
      bars.innerHTML+=`<div class="grade-bar-row"><div class="grade-bar-label">${g}</div><div class="grade-bar-track"><div class="grade-bar-fill fill-lead" style="width:${pct}%"></div></div><div class="grade-bar-count">${gc[g]}</div></div>`;
    });
  }

  renderGymStats();
}

function renderGymStats() {
  const sel=document.getElementById('gymMonthSel');
  const pe=allEntries.filter(e=>e.person===gymStatsPerson);
  const months=[...new Set(pe.map(e=>e.yearMonth).filter(Boolean))].sort().reverse();
  if(!months.length){document.getElementById('gymMonthGrid').innerHTML='<p style="color:#a8a29e;font-size:0.85rem;grid-column:span 2">暂无数据</p>';return;}
  if(sel.options.length!==months.length){
    sel.innerHTML='';
    months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  }
  const cm=sel.value||months[0];
  const me=pe.filter(e=>e.yearMonth===cm);
  const gymDays={};
  me.forEach(e=>{
    if(!e.gym)return;
    const day=e.date?e.date.slice(0,5):String(e.ts);
    if(!gymDays[e.gym])gymDays[e.gym]=new Set();
    gymDays[e.gym].add(day);
  });
  const grid=document.getElementById('gymMonthGrid');
  if(!Object.keys(gymDays).length){grid.innerHTML='<p style="color:#a8a29e;font-size:0.85rem;grid-column:span 2">该月暂无记录</p>';return;}
  grid.innerHTML='';
  Object.entries(gymDays).sort((a,b)=>b[1].size-a[1].size).forEach(([gym,days])=>{
    grid.innerHTML+=`<div class="gym-stat-box"><div class="gym-stat-name">${gym}</div><div class="gym-stat-visits">${days.size}</div><div class="gym-stat-sub">次到访</div></div>`;
  });
}
document.getElementById('gymMonthSel').addEventListener('change',renderGymStats);

// ── RENDER CHART ──
function renderChart() {
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}));}
  function avgByDay(person){
    return days.map(day=>{
      const m=allEntries.filter(e=>e.person===person&&e.date&&e.date.startsWith(day));
      return m.length?m.reduce((s,e)=>s+e.mood,0)/m.length:null;
    });
  }
  const datasets=PEOPLE.map(p=>({label:p,data:avgByDay(p),borderColor:COLORS[p],backgroundColor:COLORS[p]+'22',borderWidth:2.5,pointBackgroundColor:COLORS[p],pointRadius:5,pointHoverRadius:7,tension:0.4,fill:false,spanGaps:true}));
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('chart'),{type:'line',data:{labels:days,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e293b',borderColor:'#334155',borderWidth:1,titleColor:'#94a3b8',bodyColor:'#f1f5f9',callbacks:{label:ctx=>` ${ctx.dataset.label}：${ctx.parsed.y?ctx.parsed.y.toFixed(1):'—'}`}}},scales:{y:{min:1,max:5,ticks:{color:'#a8a29e',stepSize:1},grid:{color:'#f5f5f4'}},x:{ticks:{color:'#a8a29e',font:{size:10}},grid:{color:'#f5f5f4'}}}}});
}




// ── FIREBASE ──
function initFirebase() {
  const status=document.getElementById('syncStatus');
  window.fbListen(entries=>{
    allEntries=entries;
    status.innerHTML='<div class="sync-dot"></div>已连接 · 实时同步';
    status.classList.add('connected');
    renderEntries(); renderChart(); renderStats();
  });
}
if(window.firebaseReady) initFirebase();
else document.addEventListener('firebase-ready',initFirebase);

// init on load
initLogGradeTable();
</script>
